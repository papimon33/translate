name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "tag=desktop-v$(node -p "require('./desktop/package.json').version")" >> "$GITHUB_OUTPUT"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" \
              --title "KAC Translator 데스크톱 $tag" \
              --notes "데스크톱 앱 설치본. 웹앱 프로필 → '데스크톱 앱'에서 자동으로 내려받습니다."

  build:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: "--win nsis"
            glob: "desktop/dist/*.exe"
          - os: macos-latest
            target: "--mac dmg"
            glob: "desktop/dist/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install desktop deps
        working-directory: desktop
        run: npm ci
      - name: Build installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder ${{ matrix.target }} --publish never
      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release.outputs.tag }}" ${{ matrix.glob }} --clobber
