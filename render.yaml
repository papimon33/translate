# Render 배포 설정 (Blueprint).
# 대시보드에서 New + > Blueprint 로 이 저장소를 연결하면 자동 적용됩니다.
# sync:false 인 값(OPENAI_API_KEY, MONGODB_URI)은 Render 대시보드에서 직접 입력하세요.
# DB 이름(MONGODB_DB)은 server.js 에 기본값 kac_translator 로 코드 고정.
services:
  - type: web
    name: kac-translator
    runtime: node
    plan: free
    # 무료 티어는 NODE_ENV=production 이라 devDependencies(vite) 가 빠지므로 --include=dev 필수.
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # 대시보드에서 입력
      - key: MONGODB_URI
        sync: false          # MongoDB Atlas 연결 문자열, 대시보드에서 입력
      - key: ADMIN_ID
        sync: false          # 관리자 로그인 ID, 대시보드에서 입력 (미설정 시 코드 기본값 admin)
      - key: ADMIN_PASSWORD
        sync: false          # 관리자 비밀번호, 대시보드에서 입력 (미설정 시 기본값 admin — 반드시 설정)
      - key: AUTH_SECRET
        sync: false          # 로그인 쿠키 서명 키(임의 긴 문자열). 미설정 시 ADMIN_PASSWORD 에서 파생
      - key: TARGET_LANG
        value: ko
    # 모델(TRANSCRIBE/TRANSLATE/REFINE)은 server.js 에 코드 고정 → 환경변수 불필요.
    # PORT 는 Render 가 자동 주입 → server.js 가 process.env.PORT 사용(설정 불필요).
