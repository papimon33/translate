<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAC Desk</title>
<link id="manifest" rel="manifest" href="/desk.webmanifest" />
<meta name="theme-color" content="#ffffff" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="KAC Desk" />
<style>
  :root {
    --bg:#ffffff; --fg:#0a0e17; --muted:#64748b; --accent:#4f46e5; --line:#e5e7eb;
    --card:#ffffff; --chip:#f1f5f9; --chipFg:#475569;
    --bubStaff:#eef2ff; --bubStaffFg:#3730a3; --bubSelf:#f1f5f9; --bubSelfFg:#0a0e17;
    --fs:1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0b0d12; --fg:#e8eaf0; --muted:#8b93a3; --accent:#7c9cff; --line:#242a36;
      --card:#161a22; --chip:#1b2230; --chipFg:#aab2c5;
      --bubStaff:#232a52; --bubStaffFg:#c7ccff; --bubSelf:#1b2230; --bubSelfFg:#e8eaf0;
    }
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-user-select:none; user-select:none; overscroll-behavior:none; }
  .screen { position:fixed; inset:0; display:none; }
  .screen.show { display:flex; }

  /* 랜딩(세션 선택) */
  #landing { flex-direction:column; align-items:center; justify-content:center; padding:8vh 6vw; gap:22px; }
  #landing h1 { font-size:clamp(22px,5vw,34px); font-weight:800; margin:0; }
  #landing .sub { color:var(--muted); font-size:15px; margin-top:-12px; }
  #rooms { width:100%; max-width:520px; display:flex; flex-direction:column; gap:12px; }
  .room { border:1px solid var(--line); border-radius:18px; padding:20px 22px; font-size:20px; font-weight:700;
    background:var(--card); color:var(--fg); cursor:pointer; text-align:left; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .room:active { background:var(--chip); }
  .room.off { opacity:.45; cursor:not-allowed; }
  .room .tag { float:right; font-size:13px; font-weight:600; color:var(--muted); }
  #roomsEmpty { color:var(--muted); font-size:15px; }

  .brandRow { display:flex; align-items:center; gap:11px; }
  .brandRow .bt { display:flex; flex-direction:column; line-height:1.18; }
  .brandRow .bn { font-size:16px; font-weight:800; color:var(--fg); }
  .brandRow .bs { font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.02em; }

  /* 입장 화면: 세션명(안내데스크명) + 입장 버튼 */
  #enterWrap { flex-direction:column; align-items:center; justify-content:space-between;
    padding:7vh 6vw calc(7vh + env(safe-area-inset-bottom)); }
  .enterMid { text-align:center; }
  .enterMid .kind { font-size:16px; color:var(--muted); font-weight:700; letter-spacing:.05em; }
  .enterMid h1 { font-size:clamp(30px,7vw,58px); font-weight:800; margin:14px 0 0; word-break:keep-all; }
  #enterBtn { border:none; cursor:pointer; color:#fff; font-weight:800; background:#4f46e5; border-radius:30px;
    padding:22px 74px; font-size:clamp(22px,4.6vw,30px); box-shadow:0 16px 44px rgba(79,70,229,.42);
    animation:ctaPulse 1.9s ease-in-out infinite; }
  @keyframes ctaPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.035); } }

  /* 대기 화면: 안내 문구 + 언어 버튼(원탭 시작) 세로 중앙 */
  #touchWrap { flex-direction:column; align-items:center; justify-content:center;
    padding:6vh 6vw calc(6vh + env(safe-area-inset-bottom)); }
  .touchInner { display:flex; flex-direction:column; align-items:center; text-align:center; width:100%; max-width:640px; }
  .touchInner .globe { color:var(--accent); margin-bottom:16px; animation:ctaPulse 1.9s ease-in-out infinite; }
  .touchInner .tMain { font-size:clamp(26px,5.4vw,44px); font-weight:800; color:var(--fg); line-height:1.25; word-break:keep-all; }
  .touchInner .tSub { font-size:14px; color:var(--muted); font-weight:600; margin-top:12px; }
  #langBtns { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; width:100%; margin-top:34px; }
  #langBtns button { border:1px solid var(--line); border-radius:20px; background:var(--card); color:var(--fg);
    font-size:clamp(19px,3.8vw,26px); font-weight:800; padding:26px 6px; cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,.06); }
  #langBtns button:active { background:var(--chip); }
  #moreBtn { border:none; background:transparent; color:var(--muted); font-size:15px; font-weight:700; margin-top:18px; cursor:pointer; padding:8px 14px; }
  #langMore { display:none; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; width:100%; margin-top:12px; }
  #langMore.show { display:grid; }
  #langMore button { border:1px solid var(--line); border-radius:16px; background:var(--card); color:var(--fg);
    font-size:17px; font-weight:700; padding:16px 6px; cursor:pointer; }
  #langMore button:active { background:var(--chip); }

  /* 무음 종료 예고 배너(터치로 연장) */
  #idleWarn { position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 30px); transform:translateX(-50%); z-index:15;
    display:none; align-items:center; background:var(--accent); color:#fff; font-size:15px; font-weight:700;
    padding:13px 22px; border-radius:18px; cursor:pointer; box-shadow:0 10px 30px rgba(79,70,229,.4); max-width:88vw; text-align:center; }
  #idleWarn.show { display:flex; }

  /* 응대 종료 인사(잠깐 표시 후 대기 화면) */
  #thanks { position:fixed; inset:0; z-index:30; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; background:var(--bg); }
  #thanks.show { display:flex; }
  #thanks .big { font-size:clamp(34px,7vw,60px); font-weight:800; color:var(--fg); }
  #thanks .small { font-size:16px; color:var(--muted); font-weight:600; }

  /* 토스트(안내원 미준비 등) */
  #toast { position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 34px); transform:translateX(-50%);
    background:var(--fg); color:var(--bg); font-size:15px; font-weight:700; padding:13px 22px; border-radius:16px;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:20; max-width:86vw; text-align:center; }
  #toast.show { opacity:.94; }

  /* 대화 흐름(transcript): 아래=최신(선명), 위로 갈수록 흐려짐(마스크) — 지도 포함 */
  /* 하단 정렬은 justify-content:flex-end 대신 ::before 스페이서로 — flex-end + overflow 조합은
     iOS 사파리에서 위쪽 넘친 내용이 스크롤 불가(clipping)해지는 문제가 있음 */
  #stage { flex-direction:column; align-items:stretch; overflow-y:auto;
    padding:calc(9vh + env(safe-area-inset-top)) 6vw calc(5vh + env(safe-area-inset-bottom));
    -webkit-mask-image:linear-gradient(to top,#000 62%,transparent 100%);
    mask-image:linear-gradient(to top,#000 62%,transparent 100%); }
  #stage::-webkit-scrollbar { display:none; }
  #stage::before { content:''; flex:1 0 auto; } /* 스페이서: 내용이 적을 때 아래 정렬 유지 */
  .turn { margin-top:22px; display:flex; flex-direction:column; }
  .turn.staff { align-items:flex-start; }
  .turn.self  { align-items:flex-end; }
  .bub { max-width:88%; padding:.46em .64em; border-radius:20px; line-height:1.34; word-break:keep-all; overflow-wrap:anywhere;
    font-size:calc(clamp(23px,4.6vw,44px) * var(--fs)); font-weight:700; }
  .turn.staff .bub { background:var(--bubStaff); color:var(--bubStaffFg); border-bottom-left-radius:7px; }
  .turn.self  .bub { background:var(--bubSelf);  color:var(--bubSelfFg);  border-bottom-right-radius:7px; }

  /* 길안내 맵 (채팅 아래 인라인, 단일 인스턴스) */
  .item.map { margin-top:22px; border:1px solid var(--line); border-radius:20px; overflow:hidden; background:var(--card);
    box-shadow:0 6px 22px rgba(0,0,0,.08); display:flex; flex-direction:column; }
  .mapHead { display:flex; align-items:center; gap:9px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .mapHead .mIco { color:var(--accent); display:inline-flex; flex:0 0 auto; }
  .mapHead .mName { font-size:calc(16px * var(--fs)); font-weight:800; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mapHead .mChips { margin-left:auto; display:flex; gap:6px; flex:0 0 auto; }
  .mapHead .chip { display:inline-flex; align-items:center; gap:4px; background:var(--chip); color:var(--chipFg);
    font-size:13px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .mapHead .mClose { border:none; background:transparent; color:var(--muted); font-size:17px; font-weight:700;
    cursor:pointer; padding:4px 8px; margin-left:2px; flex:0 0 auto; }
  .mapHolder { height:50vh; overflow:hidden; }
  .item.map.mini .mapHolder { display:none; } /* 새 발화가 오면 자동 축소 — 헤더 탭으로 다시 펼침 */

  /* 발화 대기: 마이크 + '말씀하세요'(손님 언어) + 점 애니메이션 */
  #dots { position:absolute; inset:0; display:flex; flex-direction:column; gap:20px; align-items:center; justify-content:center; pointer-events:none; }
  #dots .mic { color:var(--accent); animation:ctaPulse 1.6s ease-in-out infinite; }
  #dots .stxt { font-size:clamp(22px,4.4vw,32px); font-weight:800; color:var(--fg); }
  #dots .drow { display:flex; gap:16px; }
  #dots .drow span { width:16px; height:16px; border-radius:50%; background:var(--muted); animation:bounce 1.2s infinite ease-in-out; }
  #dots .drow span:nth-child(2){ animation-delay:.18s; }
  #dots .drow span:nth-child(3){ animation-delay:.36s; }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); opacity:.35; } 40%{ transform:translateY(-20px); opacity:1; } }

  /* 상단 서비스 바(언어쌍 + 통역 중) */
  #svcBar { position:fixed; top:calc(env(safe-area-inset-top) + 12px); left:50%; transform:translateX(-50%); z-index:11;
    display:none; align-items:center; gap:11px; padding:7px 15px; border-radius:24px;
    background:var(--card); border:1px solid var(--line); box-shadow:0 4px 16px rgba(0,0,0,.07); max-width:90vw; }
  #svcBar.show { display:flex; }
  #svcPair { font-size:14px; font-weight:800; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #svcLiveWrap { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); font-weight:600; flex:0 0 auto; }
  #svcDot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:pulseDot 1.4s infinite ease-in-out; }
  @keyframes pulseDot { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.4; transform:scale(.75); } }

  /* 글씨 크기(접근성) */
  #a11y { position:fixed; left:14px; bottom:calc(env(safe-area-inset-bottom) + 14px); z-index:11; display:none; gap:7px; }
  #a11y.show { display:flex; }
  #a11y button { width:46px; height:46px; border-radius:13px; border:1px solid var(--line); background:var(--card); color:var(--fg);
    font-weight:800; cursor:pointer; opacity:.5; display:flex; align-items:center; justify-content:center; }
  #a11y button:active { background:var(--chip); opacity:1; }
  #a11y .s { font-size:14px; } #a11y .l { font-size:20px; }

  /* 종료(대기모드) 버튼 — 자동 숨김 */
  #endBtn { position:fixed; top:calc(env(safe-area-inset-top) + 12px); right:14px; z-index:12;
    width:40px; height:40px; border-radius:13px; border:1px solid var(--line);
    background:var(--card); color:var(--muted); display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; pointer-events:none; transition:opacity .25s; }
  #endBtn.show { opacity:1; pointer-events:auto; }
</style>
</head>
<body>
  <div id="landing" class="screen">
    <h1>안내데스크 선택</h1>
    <div class="sub">Select a desk</div>
    <div id="rooms"></div>
  </div>

  <!-- 입장: 세션명(안내데스크명) 확인 후 입장 → 전체화면 -->
  <div id="enterWrap" class="screen">
    <div class="brandRow">
      <svg width="42" height="42" viewBox="0 0 42 42" aria-hidden="true"><rect width="42" height="42" rx="12" fill="#4f46e5"/><g fill="none" stroke="#fff" stroke-width="2"><circle cx="21" cy="21" r="9.5"/><path d="M11.5 21h19M21 11.5c3.2 3 3.2 16 0 19M21 11.5c-3.2 3-3.2 16 0 19"/></g></svg>
      <span class="bt"><span class="bn" id="brandName">공항 안내 통역</span><span class="bs" id="brandSub">Airport Interpretation</span></span>
    </div>
    <div class="enterMid">
      <span class="kind">안내데스크 · Information Desk</span>
      <h1 id="deskTitle">안내데스크</h1>
    </div>
    <button id="enterBtn">입장</button>
  </div>

  <!-- 대기: 언어 버튼을 첫 화면에 바로 노출 — 원탭으로 통역 시작 -->
  <div id="touchWrap" class="screen">
    <div class="touchInner">
      <svg class="globe" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><circle cx="12" cy="12" r="9.2"/><path d="M2.8 12h18.4M12 2.8c3 2.9 3 15.5 0 18.4M12 2.8c-3 2.9-3 15.5 0 18.4"/></svg>
      <div class="tMain">Touch your language<br/>to start translation</div>
      <div class="tSub">言語をタッチして通訳を開始 · 触摸您的语言开始翻译</div>
      <div id="langBtns">
        <button data-lang="en">English</button>
        <button data-lang="ja">日本語</button>
        <button data-lang="zh">中文</button>
      </div>
      <button id="moreBtn">+ More languages</button>
      <div id="langMore">
        <button data-lang="vi">Tiếng Việt</button>
        <button data-lang="th">ไทย</button>
        <button data-lang="id">Bahasa Indonesia</button>
        <button data-lang="ru">Русский</button>
      </div>
    </div>
  </div>

  <!-- 무음 종료 예고(터치로 연장) -->
  <div id="idleWarn"><span id="warnTxt"></span>&nbsp;<b id="warnCnt"></b></div>

  <!-- 응대 종료 인사 -->
  <div id="thanks"><div class="big">Thank you</div><div class="small">감사합니다 · ありがとうございました · 谢谢</div></div>

  <div id="stage" class="screen">
    <div id="dots">
      <svg class="mic" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <span class="stxt" id="speakTxt">Please speak</span>
      <div class="drow"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div id="svcBar"><span id="svcPair"></span><span id="svcLiveWrap"><span id="svcDot"></span><span id="svcLive"></span></span></div>
  <div id="toast"></div>
  <div id="a11y">
    <button class="s" data-d="-1" aria-label="글씨 작게">A−</button>
    <button class="l" data-d="1" aria-label="글씨 크게">A+</button>
  </div>
  <div id="endBtn" aria-label="대기모드로">✕</div>

<script>
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
let sessionId = params.get('session') || '';

/* 브랜드(플레이스홀더 — 운영 시 교체) */
const BRAND = { name: '공항 안내 통역', sub: 'Airport Interpretation' };
$('brandName').textContent = BRAND.name; $('brandSub').textContent = BRAND.sub;

(function(){ const mf = $('manifest'); if (mf && sessionId) mf.href = '/desk.webmanifest?session=' + encodeURIComponent(sessionId); })();
function isStandalone(){
  try { return window.matchMedia('(display-mode: fullscreen)').matches || window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; } catch { return false; }
}
function show(id){
  ['landing','enterWrap','touchWrap','stage'].forEach(s => $(s).classList.toggle('show', s===id));
  const svc = (id === 'stage');
  $('svcBar').classList.toggle('show', svc);
  $('a11y').classList.toggle('show', svc);
}
function esc(s){ return String(s).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
let toastTimer = null;
function toast(msg){ const el = $('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3200); }

let curLang = 'en', started = false, ws = null;
let entered = false;        // 입장 버튼 이후(상시 WS 연결 유지 구간)
let pendingStart = false;   // 언어 선택 후 desk-active 대기 중
let hostActive = false;     // 안내원(호스트) 캡처 활성 여부
let gotActive = false, activeGuard = null; // desk-active(통역 시작 확인) 수신 여부
const cards = new Map();   // id -> { el, bub, texts, source, lang }
let order = [];

/* ---- 언어·문구 현지화(손님 언어 기준, en 폴백) ---- */
const LANGNAME = { ko:'한국어', en:'English', ja:'日本語', zh:'中文', vi:'Tiếng Việt', th:'ไทย', id:'Bahasa Indonesia', ru:'Русский', tl:'Filipino', ms:'Bahasa Melayu' };
const UI = {
  interpreting: { ko:'통역 중', en:'Interpreting', ja:'通訳中', zh:'翻译中', vi:'Đang dịch' },
  connecting:   { ko:'연결 중…', en:'Connecting…', ja:'接続中…', zh:'连接中…', vi:'Đang kết nối…' },
  speak:        { ko:'말씀하세요', en:'Please speak', ja:'お話しください', zh:'请讲话', vi:'Xin hãy nói', th:'กรุณาพูด', id:'Silakan bicara', ru:'Говорите' },
  warn:         { ko:'곧 종료됩니다 — 계속하려면 터치하거나 말씀하세요', en:'Ending soon — tap or speak to continue', ja:'まもなく終了します — 続けるにはタッチ', zh:'即将结束 — 触摸或讲话以继续', vi:'Sắp kết thúc — chạm để tiếp tục', th:'ใกล้สิ้นสุด — แตะเพื่อดำเนินการต่อ', id:'Segera berakhir — ketuk untuk lanjut', ru:'Скоро завершится — коснитесь экрана' },
  walk:         { ko:'도보', en:'Walk', ja:'徒歩', zh:'步行', vi:'Đi bộ' },
  min:          { ko:'분', en:' min', ja:'分', zh:'分钟', vi:' phút' },
};
function t(k){ const d = UI[k] || {}; return d[curLang] || d.en || d.ko || k; }
/* 시설 카테고리 → 손님 언어 라벨(ko/en/ja/zh, 그 외 en 폴백) */
const CAT_EN = { restroom:'Restroom', smoking:'Smoking area', pharmacy:'Pharmacy', convenience:'Convenience store',
  exchange:'Currency exchange', charging:'Charging station', lounge:'Lounge', nursing:'Nursing room', prayer:'Prayer room',
  water:'Water fountain', security:'Security check', immigration:'Immigration', customs:'Customs', duty_free:'Duty free',
  info_desk:'Information', baggage:'Baggage claim', gate:'Gate', food:'Restaurant', ticket:'Bus tickets',
  wheelchair:'Wheelchair', stroller:'Stroller', aed:'AED', elevator:'Elevator', escalator:'Escalator', stairs:'Stairs' };
const CAT_JA = { restroom:'トイレ', smoking:'喫煙所', pharmacy:'薬局', convenience:'コンビニ',
  exchange:'両替所', charging:'充電スペース', lounge:'ラウンジ', nursing:'授乳室', prayer:'祈祷室',
  water:'給水機', security:'保安検査場', immigration:'出入国審査', customs:'税関', duty_free:'免税店',
  info_desk:'案内所', baggage:'手荷物受取所', gate:'搭乗ゲート', food:'レストラン', ticket:'バス乗車券',
  wheelchair:'車椅子', stroller:'ベビーカー', aed:'AED', elevator:'エレベーター', escalator:'エスカレーター', stairs:'階段' };
const CAT_ZH = { restroom:'洗手间', smoking:'吸烟区', pharmacy:'药店', convenience:'便利店',
  exchange:'货币兑换', charging:'充电站', lounge:'休息室', nursing:'母婴室', prayer:'祈祷室',
  water:'饮水机', security:'安检', immigration:'边检', customs:'海关', duty_free:'免税店',
  info_desk:'问询处', baggage:'行李提取处', gate:'登机口', food:'餐厅', ticket:'巴士车票',
  wheelchair:'轮椅', stroller:'婴儿车', aed:'AED', elevator:'电梯', escalator:'自动扶梯', stairs:'楼梯' };
function catLabel(m){
  if (curLang === 'ko') return m.ko || '';
  if (curLang === 'ja') return CAT_JA[m.category] || CAT_EN[m.category] || m.ko || '';
  if (curLang === 'zh') return CAT_ZH[m.category] || CAT_EN[m.category] || m.ko || '';
  return CAT_EN[m.category] || m.ko || '';
}
function floorLbl(f){ const n = String(f||'').replace(/[^0-9]/g,''); if(!n) return f||'';
  return curLang==='ko' ? (n+'층') : curLang==='ja' ? (n+'階') : curLang==='zh' ? (n+'层') : (n+'F'); }

/* ---- transcript 표시 ----
   발화 언어(lang) 기준으로 안내원(ko)/손님을 판별 — 번역이 늦게 도착해도 말풍선 방향이 바뀌지 않음.
   화자 라벨(안내원/나)은 표시하지 않고 좌우 정렬만 유지. */
function textOf(c){
  const staff = c.lang ? c.lang === 'ko' : !!(c.texts && c.texts[curLang]); // lang 없으면(구 데이터) 번역 존재 여부로 폴백
  if (staff) return { t:(c.texts && c.texts[curLang]) || '', staff:true };  // 안내원 답변(손님 언어) — 번역 도착 전엔 숨김
  return { t:c.source || '', staff:false };                                 // 손님 자기 발화(원문)
}
function scrollBottom(){ const s=$('stage'); s.scrollTop = s.scrollHeight; }
function renderCard(c){
  const r = textOf(c);
  c.bub.textContent = r.t;
  c.el.className = 'item turn ' + (r.staff ? 'staff' : 'self');
  c.el.style.display = r.t ? '' : 'none';
}
function upsert(item){
  let c = cards.get(item.id);
  if (!c){
    const el = document.createElement('div'); el.className = 'item turn';
    const bub = document.createElement('div'); bub.className = 'bub';
    el.appendChild(bub);
    c = { el, bub }; cards.set(item.id, c); order.push(item.id); $('stage').appendChild(el);
    collapseMapMini(); // 새 발화 시작 → 지도 자동 축소(대화 흐름 우선)
  }
  c.texts = item.texts || {}; c.source = item.source || '';
  if (item.lang) c.lang = item.lang;
  renderCard(c);
  hideIdleWarn(); // 발화가 이어지면 종료 예고 해제(서버 타이머도 리셋됨)
  // '말씀하세요' 안내는 '보이는' 카드가 없을 때만 — 에코 드랍으로 숨겨진 카드는 세지 않음
  const anyVisible = [...cards.values()].some((x) => x.el.style.display !== 'none');
  $('dots').style.display = anyVisible ? 'none' : 'flex';
  scrollBottom();
}
function rerender(){ cards.forEach(renderCard); }
function clearAll(){
  cards.forEach(c => { try { c.el.remove(); } catch {} });
  cards.clear(); order = [];
  if (mapBlock) { try { mapBlock.remove(); } catch {} }
  $('dots').style.display = 'flex';
}
function applySxInfo(info){
  if(!info) return;
  if(info.mode !== 'two'){
    // 서버는 대기(idle)인데 클라만 진행 중(절전으로 desk-reset 을 놓친 경우) → 이전 대화를 지우고 터치 화면 복귀
    if (started && !pendingStart) backToTouch();
    return;
  }
  if(!started){ if (entered && hostActive) enterStage(info.b); return; } // 접속 시 이미 통역 중이면 바로 통역 화면으로
  curLang = info.b || curLang; setSvcPair();
  rerender(); try { mapApi && mapApi.setLang(curLang); } catch {}
}
function setSvcPair(){ $('svcPair').textContent = curLang === 'ko' ? '한국어' : '한국어 ↔ ' + (LANGNAME[curLang] || String(curLang).toUpperCase()); $('svcLive').textContent = t('interpreting'); $('svcDot').style.display = ''; }
function setSvcConnecting(){ $('svcPair').textContent = t('connecting'); $('svcLive').textContent = ''; $('svcDot').style.display = 'none'; }

/* ---- 길안내 맵 (채팅 아래 인라인, 단일 인스턴스 — 새 안내 시 맨 아래로 이동) ---- */
let mapApi = null, mapLoading = false, mapBlock = null, mapLoadTries = 0;
function loadMapScripts(cb){
  if (window.AirportMap25D && window.AIRPORT_DATA) return cb();
  if (mapLoading) { setTimeout(()=>loadMapScripts(cb), 200); return; }
  if (mapLoadTries >= 3) return; // 에셋 404/오프라인 시 wayfind 마다 스크립트 태그가 무한 누적되던 문제 방지
  mapLoadTries++;
  mapLoading = true;
  let n = 0; const done = () => { if (++n >= 2) { mapLoading = false; cb(); } };
  for (const src of ['/map/wayfinding_data.js', '/map/airport25d.js']) {
    const s = document.createElement('script'); s.src = src; s.onload = done; s.onerror = done; document.head.appendChild(s);
  }
}
function ensureMapBlock(){
  if (mapBlock) return mapBlock;
  mapBlock = document.createElement('div'); mapBlock.className = 'item map';
  const head = document.createElement('div'); head.className = 'mapHead';
  head.innerHTML = '<span class="mIco"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span><span class="mName"></span><span class="mChips"></span><button class="mClose" aria-label="Close">✕</button>';
  const holder = document.createElement('div'); holder.className = 'mapHolder';
  mapBlock.appendChild(head); mapBlock.appendChild(holder);
  mapBlock._holder = holder; mapBlock._head = head;
  // 헤더 탭 = 접기/펼치기, ✕ = 지도 제거
  head.addEventListener('click', () => { if (mapBlock) { mapBlock.classList.toggle('mini'); scrollBottom(); } });
  head.querySelector('.mClose').addEventListener('click', (e) => { e.stopPropagation(); removeMap(); });
  return mapBlock;
}
function removeMap(){ if (mapBlock) { try { mapBlock.remove(); } catch {} } mapBlock = null; mapApi = null; }
function collapseMapMini(){ if (mapBlock && mapBlock.isConnected && !mapBlock.classList.contains('mini')) mapBlock.classList.add('mini'); }
function fillMapHead(m, res){
  if (!mapBlock) return;
  mapBlock._head.querySelector('.mName').textContent = catLabel(m) + ' · ' + floorLbl(m.floor);
  const chips = mapBlock._head.querySelector('.mChips'); chips.textContent = '';
  const sums = (res && res.summaries) || [];
  if (sums.length){
    const best = sums.reduce((a,b) => (b && a && b.meters < a.meters ? b : a), sums[0]);
    if (best){
      let html = '<span class="chip">' + t('walk') + ' ' + Math.max(1, Math.round(best.minutes||0)) + t('min') + '</span>';
      if (best.meters) html += '<span class="chip">' + Math.round(best.meters) + ' m</span>';
      chips.innerHTML = html;
    }
  }
}
function showWayfind(m){
  if (!started) return;
  loadMapScripts(() => {
    const block = ensureMapBlock();
    block.classList.remove('mini');                 // 새 안내는 펼친 상태로
    $('stage').appendChild(block);                  // 항상 맨 아래(채팅 아래)로
    scrollBottom();
    const doRoute = () => { try { mapApi.setLang(curLang); const res = mapApi.showRoute({ deskFloor: m.deskFloor||'1F', deskSide: m.deskSide||'S', dest: m.dests }); fillMapHead(m, res); scrollBottom(); } catch (e) {} };
    if (mapApi) { doRoute(); return; }
    if (!window.AirportMap25D || !window.AIRPORT_DATA) return;
    // 첫 생성: 층 래스터화(비동기) 끝난 뒤 경로 표시
    mapApi = AirportMap25D.create({ container: block._holder, data: window.AIRPORT_DATA, lang: curLang, onReady: doRoute });
  });
}

/* ---- WS: 입장 후 상시 연결 유지 — 호스트가 시작해도(desk-active) 뷰어가 즉시 통역 화면으로 전환 ---- */
function ensureWs(){
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/viewer?session=${sessionId}`);
  ws.binaryType = 'arraybuffer';
  // (재)접속 시: '언어를 막 골라 확인 대기 중'일 때만 시작 요청 재전송.
  // started 만으로 재전송하면 절전 중 서버가 idle 종료된 뒤 깨어나며 빈 응대를 새로 과금 시작하는 문제가 있어,
  // 진행 중 세션의 실제 상태는 접속 직후 서버가 보내는 meta 로 동기화한다(idle 이면 터치 화면 복귀).
  ws.onopen = () => {
    if (pendingStart) sendStart();
    if (gm) { try { ws.send(JSON.stringify({ type: 'desk-mic', on: true })); } catch {} }
    if (pendingKeepalive) { pendingKeepalive = false; try { ws.send(JSON.stringify({ type: 'desk-keepalive' })); } catch {} }
  };
  ws.onclose = () => { ws = null; if (entered) setTimeout(ensureWs, 1500); };
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'snapshot') (m.items||[]).forEach(upsert);
    else if (m.type === 'sentence') upsert(m);
    else if (m.type === 'host') hostActive = !!m.active;
    else if (m.type === 'meta') applySxInfo(m.sxInfo);
    else if (m.type === 'desk-active') enterStage(m.lang);   // 통역 시작(손님 선택 또는 호스트 시작)
    else if (m.type === 'wayfind') showWayfind(m);           // 시설 안내(호스트 승인 후) → 채팅 아래 인라인 지도
    else if (m.type === 'desk-idle-warn') showIdleWarn(m.secondsLeft || 10); // 무음 종료 예고(터치로 연장)
    else if (m.type === 'desk-reset') { if (started || pendingStart) backToTouch(started); } // 대화 종료 → (인사 후) 터치 화면
    else if (m.type === 'status' && pendingStart && !gotActive && m.message) { toast(m.message); backToTouch(); } // 안내원 미준비 등
  };
}
function sendStart(){ try { ws && ws.send(JSON.stringify({ type:'desk-start', lang: curLang })); } catch {} }

// 통역 화면 진입 — 서버의 desk-active 확인 시(언어 선택 직후 또는 호스트 측 시작)
function enterStage(lang){
  clearTimeout(activeGuard);
  clearTimeout(thanksTimer); $('thanks').classList.remove('show'); // 감사 인사 잔여 타이머가 새 응대 화면을 덮지 않게
  // meta 와 desk-active 가 연달아 도착해 이중 진입하던 것 가드(여객 마이크 파이프라인 2개 생성 방지)
  if (started && gotActive) { if (lang) { curLang = lang; setSvcPair(); rerender(); } return; }
  pendingStart = false; gotActive = true; started = true;
  if (lang) curLang = lang;
  $('speakTxt').textContent = t('speak'); // 발화 유도(손님 언어)
  setSvcPair(); rerender();
  try { mapApi && mapApi.setLang(curLang); } catch {}
  show('stage');
  guestMicStart(); // 2채널: 여객 태블릿 마이크 상시 캡처 시작(실패 시 데스크 마이크 단일 채널로 동작)
}

// 대화 종료: (응대했던 경우 감사 인사 잠깐) → 대기(터치) 화면 복귀(전체화면·WS 연결 유지)
function backToTouch(withThanks){
  started = false; gotActive = false; pendingStart = false;
  clearTimeout(activeGuard);
  guestMicStop();
  hideIdleWarn();
  clearAll();
  if (withThanks) {
    $('thanks').classList.add('show');
    clearTimeout(thanksTimer);
    thanksTimer = setTimeout(() => {
      $('thanks').classList.remove('show');
      if (!started) show('touchWrap'); // 그 사이 새 응대가 시작됐으면 stage 유지
    }, 1500);
  } else {
    show('touchWrap');
  }
}
let thanksTimer = null;

/* ---- 여객 마이크(2채널 화자 귀속): 통역 중 상시 캡처 → 서버 여객 채널로 전송 ----
   근접 게이트: 여객 입은 태블릿에서 ~30cm, 안내원·주변음은 멀어서 작게 잡힘 →
   임계(GM_GATE) 미만이면 무음을 보내 누화·안내방송을 차단(무음 전송은 엔드포인트 판정 유지용). */
const GM_GATE = 0.04;
let gm = null; // { stream, ctx, proc }
let gmStarting = false; // getUserMedia 대기 중 재진입 가드(파이프라인 이중 생성·마이크 누수 방지)
function f32to16(f32){ const b = new ArrayBuffer(f32.length * 2), v = new DataView(b); for (let i = 0; i < f32.length; i++){ let s = Math.max(-1, Math.min(1, f32[i])); s = s < 0 ? s * 0x8000 : s * 0x7fff; v.setInt16(i * 2, s, true); } return b; }
function ds24(f32, rate){ if (rate === 24000) return f32; const r = rate / 24000, n = Math.round(f32.length / r), o = new Float32Array(n); for (let i = 0; i < n; i++){ const idx = i * r, i0 = Math.floor(idx), i1 = Math.min(i0 + 1, f32.length - 1); o[i] = f32[i0] * (1 - (idx - i0)) + f32[i1] * (idx - i0); } return o; }
async function guestMicStart(){
  if (gm || gmStarting) { try { ws && ws.readyState === 1 && ws.send(JSON.stringify({ type: 'desk-mic', on: true })); } catch {} return; }
  gmStarting = true;
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } }); }
  catch { gmStarting = false; toast('태블릿 마이크를 사용할 수 없어 안내데스크 마이크로만 인식합니다.'); return; }
  gmStarting = false;
  if (!started || gm) { try { stream.getTracks().forEach((t) => t.stop()); } catch {} return; } // 권한 대기 중 종료/중복 생성된 경우
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  try { ctx.resume(); } catch {}
  const rate = ctx.sampleRate;
  const node = ctx.createMediaStreamSource(stream);
  const proc = ctx.createScriptProcessor(4096, 1, 1);
  node.connect(proc);
  const g = ctx.createGain(); g.gain.value = 0; proc.connect(g); g.connect(ctx.destination);
  let openUntil = 0;
  proc.onaudioprocess = (e) => {
    if (!gm || !ws || ws.readyState !== 1 || !started) return;
    // 백프레셔: 네트워크가 밀려 소켓 버퍼에 오디오가 쌓이면 이 프레임은 버림 —
    // 밀린 오디오를 그대로 보내면 이후 모든 인식이 그 시간만큼 늦게 도착한다(지연 누적 방지)
    if (ws.bufferedAmount > 131072) return;
    const input = e.inputBuffer.getChannelData(0);
    let peak = 0;
    for (let i = 0; i < input.length; i++) { const v = Math.abs(input[i]); if (v > peak) peak = v; }
    if (peak >= GM_GATE) openUntil = Date.now() + 300; // 큰 소리 감지 → 300ms 홀드
    const ds = ds24(input, rate);
    ws.send(Date.now() < openUntil ? f32to16(ds) : new ArrayBuffer(ds.length * 2));
  };
  gm = { stream, ctx, proc };
  try { ws && ws.readyState === 1 && ws.send(JSON.stringify({ type: 'desk-mic', on: true })); } catch {}
}
function guestMicStop(){
  if (!gm) return;
  try { ws && ws.readyState === 1 && ws.send(JSON.stringify({ type: 'desk-mic', on: false })); } catch {}
  try { gm.proc.onaudioprocess = null; } catch {}
  try { gm.stream.getTracks().forEach((t) => t.stop()); } catch {}
  try { gm.ctx.close(); } catch {}
  gm = null;
}

/* ---- 무음 종료 예고 배너: 카운트다운 + 터치로 연장(desk-keepalive) ---- */
let warnIv = null;
function showIdleWarn(secs){
  if (!started) return;
  $('warnTxt').textContent = t('warn');
  let left = secs;
  $('warnCnt').textContent = left + 's';
  $('idleWarn').classList.add('show');
  clearInterval(warnIv);
  warnIv = setInterval(() => { left--; if (left <= 0) hideIdleWarn(); else $('warnCnt').textContent = left + 's'; }, 1000);
}
function hideIdleWarn(){ clearInterval(warnIv); warnIv = null; $('idleWarn').classList.remove('show'); }
let pendingKeepalive = false; // 재접속 창에서 누른 연장 요청을 다음 연결에서 전송(그냥 버려지던 문제 수정)
$('idleWarn').addEventListener('click', () => {
  if (ws && ws.readyState === 1) { try { ws.send(JSON.stringify({ type:'desk-keepalive' })); } catch {} }
  else pendingKeepalive = true;
  hideIdleWarn();
});

/* ---- 전체화면 ---- */
function goFullscreen(){
  if (isStandalone()) return;
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (fn) { try { fn.call(el); } catch {} }
}

/* ---- 통역 시작(언어 선택 후) / 종료 ---- */
function startWithLang(lang){
  if (started) return;
  curLang = lang; gotActive = false; pendingStart = true;
  clearAll();
  setSvcConnecting();
  show('stage');
  ensureWs();
  if (ws && ws.readyState === WebSocket.OPEN) sendStart();
  clearTimeout(activeGuard);
  activeGuard = setTimeout(() => { if (pendingStart && !gotActive) { toast('안내원이 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요.'); backToTouch(); } }, 8000);
}
function end(){
  try { ws && ws.send(JSON.stringify({ type:'desk-end' })); } catch {} // 서버 대화 종료(기록 보존) 요청
  backToTouch(started);
}

/* ---- 글씨 크기(접근성) ---- */
let fs = parseFloat(localStorage.getItem('deskFs') || '1'); if (!(fs >= 0.8 && fs <= 1.6)) fs = 1;
function applyFs(){ fs = Math.min(1.6, Math.max(0.8, Math.round(fs*10)/10)); document.documentElement.style.setProperty('--fs', fs); localStorage.setItem('deskFs', String(fs)); }
applyFs();
$('a11y').addEventListener('click', (e) => { const b = e.target.closest('button'); if (!b) return; fs += (b.dataset.d === '1' ? 0.1 : -0.1); applyFs(); });

/* ---- 랜딩(세션 선택) ---- */
let roomsPoll = null;
async function loadRooms(){
  const box = $('rooms');
  try {
    const list = await fetch('/api/desk-sessions').then(r => r.json());
    box.innerHTML = '';
    if (!list.length) { box.innerHTML = '<div id="roomsEmpty">등록된 안내데스크가 없습니다.</div>'; return; }
    list.forEach(s => {
      const b = document.createElement('button');
      b.className = 'room' + (s.active ? '' : ' off');   // active=안내원 대기 중일 때만 선택 가능
      b.innerHTML = esc(s.title) + (s.active ? '' : '<span class="tag">안내원 준비 중</span>');
      if (s.active) {
        b.addEventListener('click', () => {
          if (roomsPoll) { clearInterval(roomsPoll); roomsPoll = null; }
          sessionId = s.id; const mf=$('manifest'); if(mf) mf.href='/desk.webmanifest?session='+encodeURIComponent(sessionId);
          $('deskTitle').textContent = s.title || '안내데스크';
          show('enterWrap');
        });
      } else b.disabled = true;
      box.appendChild(b);
    });
  } catch { box.innerHTML = '<div id="roomsEmpty">목록을 불러오지 못했습니다.</div>'; }
}

/* ---- 종료 버튼 자동 숨김 ---- */
let endTimer = null;
function flashEnd(){ $('endBtn').classList.add('show'); clearTimeout(endTimer); endTimer = setTimeout(() => $('endBtn').classList.remove('show'), 3000); }

/* ---- 화면 전환 이벤트 ---- */
$('enterBtn').addEventListener('click', () => { entered = true; goFullscreen(); ensureWs(); show('touchWrap'); });
// 대기 화면: 언어 버튼 원탭으로 바로 시작
const pickLang = (e) => { const b = e.target.closest('button[data-lang]'); if (!b) return; startWithLang(b.dataset.lang); };
$('langBtns').addEventListener('click', pickLang);
$('langMore').addEventListener('click', pickLang);
$('moreBtn').addEventListener('click', (e) => { e.stopPropagation(); $('langMore').classList.toggle('show'); });
$('endBtn').addEventListener('click', end);
$('stage').addEventListener('click', flashEnd);
// 전체화면이 풀렸으면(ESC·시스템 제스처) 다음 터치에서 자동으로 전체화면 복귀
// + 여객 마이크 AudioContext 가 제스처 없이 시작돼 suspended 면(호스트 측 시작 케이스) 터치로 재개
document.addEventListener('click', () => {
  if (entered && !isStandalone() && !document.fullscreenElement && !document.webkitFullscreenElement) goFullscreen();
  if (gm && gm.ctx && gm.ctx.state === 'suspended') { try { gm.ctx.resume(); } catch {} }
}, true);

/* ---- 세션 제목(안내데스크명) 표시 ---- */
async function loadTitle(){
  try {
    const list = await fetch('/api/desk-sessions').then(r => r.json());
    const s = list.find(x => x.id === sessionId);
    if (s && s.title) $('deskTitle').textContent = s.title;
  } catch {}
}

// 화면 복귀(태블릿 절전 등) 시 즉시 재접속 — 1.5초 재시도 타이머보다 빠르게 복구
document.addEventListener('visibilitychange', () => { if (!document.hidden && entered) ensureWs(); });

// iPad/iOS Safari 는 전체화면 API 가 없어 '홈 화면에 추가'(PWA)로 실행해야 전체화면 유지 가능 — 입장 화면에 안내
(function(){
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS && !isStandalone()) {
    const el = document.createElement('div');
    el.style.cssText = 'margin-top:14px;font-size:13px;color:var(--muted);text-align:center;max-width:420px;line-height:1.5;';
    el.textContent = 'iPad에서는 사파리 공유 버튼 → "홈 화면에 추가"로 설치한 뒤 실행하면 전체화면으로 동작합니다.';
    const mid = document.querySelector('#enterWrap .enterMid');
    if (mid) mid.appendChild(el);
  }
})();

// 브라우저 오류 보고(관리자 시스템 상태) — 60초 스로틀
let __errAt = 0;
window.addEventListener('error', (e) => {
  const t = Date.now(); if (t - __errAt < 60000) return; __errAt = t;
  try { fetch('/api/client-log', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ msg: 'desk: ' + e.message, src: (e.filename||'') + ':' + (e.lineno||0) }) }); } catch {}
});

// 진입: 세션 지정(QR) 시 해당 데스크 입장 화면, 아니면 랜딩(안내데스크 선택, 4초 갱신)
if (sessionId) { loadTitle(); show('enterWrap'); }
else { show('landing'); loadRooms(); roomsPoll = setInterval(loadRooms, 4000); }
</script>
</body>
</html>
