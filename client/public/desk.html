<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAC Desk</title>
<link id="manifest" rel="manifest" href="/desk.webmanifest" />
<meta name="theme-color" content="#ffffff" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="KAC Desk" />
<style>
  :root { --bg:#ffffff; --fg:#0a0e17; --muted:#64748b; --accent:#4f46e5; --line:#e5e7eb; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-user-select:none; user-select:none; overscroll-behavior:none; }
  .screen { position:fixed; inset:0; display:none; }
  .screen.show { display:flex; }
  /* 랜딩(세션 선택) */
  #landing { flex-direction:column; align-items:center; justify-content:center; padding:8vh 6vw; gap:22px; }
  #landing h1 { font-size:clamp(22px,5vw,34px); font-weight:800; margin:0; }
  #landing .sub { color:var(--muted); font-size:15px; margin-top:-12px; }
  #rooms { width:100%; max-width:520px; display:flex; flex-direction:column; gap:12px; }
  .room { border:1px solid var(--line); border-radius:18px; padding:20px 22px; font-size:20px; font-weight:700;
    background:#fff; color:var(--fg); cursor:pointer; text-align:left; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .room:active { background:#f3f4f6; }
  .room.off { opacity:.45; cursor:not-allowed; }
  .room .tag { float:right; font-size:13px; font-weight:600; color:var(--muted); }
  #roomsEmpty { color:var(--muted); font-size:15px; }
  /* 시작 화면 */
  #startWrap { align-items:center; justify-content:center; }
  #startBtn { border:none; cursor:pointer; color:#fff; font-weight:800;
    background:linear-gradient(135deg,#6366f1,#7c9cff); border-radius:28px;
    padding:34px 56px; font-size:30px; line-height:1.35; text-align:center;
    box-shadow:0 16px 50px rgba(99,102,241,.4); }
  #startBtn small { display:block; font-size:16px; font-weight:600; opacity:.92; margin-top:10px; }
  /* 번역 표시 */
  #stage { flex-direction:column; justify-content:center;
    padding:6vh 6vw calc(6vh + env(safe-area-inset-bottom)); gap:18px; }
  .line { line-height:1.4; word-break:keep-all; overflow-wrap:anywhere; }
  .line.prev { font-size:clamp(20px,4vw,40px); color:var(--muted); opacity:.6; }
  .line.cur  { font-size:clamp(32px,7vw,76px); font-weight:800; }
  .line.cur.staff { color:var(--accent); }
  .line.cur.self  { color:var(--fg); opacity:.9; }
  #dots { display:flex; gap:22px; align-items:flex-end; justify-content:center; height:40vh; }
  #dots span { width:24px; height:24px; border-radius:50%; background:var(--muted);
    animation:bounce 1.2s infinite ease-in-out; }
  #dots span:nth-child(2){ animation-delay:.18s; }
  #dots span:nth-child(3){ animation-delay:.36s; }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); opacity:.35; } 40%{ transform:translateY(-34px); opacity:1; } }
  /* 종료(X): 평소엔 숨김, 화면 탭하면 잠깐 표시 */
  /* 길안내 맵 오버레이(자동 표시/숨김) */
  #mapOverlay { position:fixed; inset:0; z-index:20; display:none; flex-direction:column; background:#fff; }
  #map { flex:1; min-height:0; }
  #mapCap { padding:14px 18px calc(14px + env(safe-area-inset-bottom)); font-size:clamp(20px,4.5vw,34px); font-weight:800;
    color:var(--accent); text-align:center; background:#fff; border-top:1px solid var(--line); }
  #endBtn { position:fixed; top:calc(env(safe-area-inset-top) + 12px); right:14px; z-index:11;
    width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
    background:rgba(255,255,255,.85); color:var(--muted); font-size:18px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    opacity:0; pointer-events:none; transition:opacity .25s; }
  #endBtn.show { opacity:1; pointer-events:auto; }
</style>
</head>
<body>
  <div id="landing" class="screen">
    <h1>안내데스크 선택</h1>
    <div class="sub">Select a desk</div>
    <div id="rooms"></div>
  </div>

  <div id="startWrap" class="screen">
    <button id="startBtn">
      Touch and say in your language
      <small>請触摸并用您的语言说话 · タッチして話してください · Chạm và nói bằng ngôn ngữ của bạn</small>
    </button>
  </div>

  <div id="stage" class="screen">
    <div id="dots"><span></span><span></span><span></span></div>
    <div id="lines"></div>
  </div>
  <div id="endBtn">✕</div>

  <!-- 길안내 맵 오버레이 -->
  <div id="mapOverlay"><div id="map"></div><div id="mapCap"></div></div>

<script>
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
let sessionId = params.get('session') || '';
(function(){ const mf = $('manifest'); if (mf && sessionId) mf.href = '/desk.webmanifest?session=' + encodeURIComponent(sessionId); })();
function isStandalone(){
  try { return window.matchMedia('(display-mode: fullscreen)').matches || window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; } catch { return false; }
}
function show(id){ ['landing','startWrap','stage'].forEach(s => $(s).classList.toggle('show', s===id)); }

let curLang = 'ko', started = false, ws = null;
const cards = new Map();
let order = [];

/* ---- 표시 ---- */
function applySxInfo(info){ if(!info) return; if(info.mode==='two') curLang = info.b || curLang; render(); }
function textOf(c){
  if (c.texts && c.texts[curLang]) return { t:c.texts[curLang], staff:true };
  if (c.source) return { t:c.source, staff:false };
  return { t:'', staff:false };
}
function upsert(item){
  let c = cards.get(item.id);
  if (!c){ c={}; cards.set(item.id,c); order.push(item.id); }
  c.texts = item.texts || {}; c.source = item.source || '';
  render();
}
function clearAll(){ cards.clear(); order=[]; render(); }
function render(){
  if (!started) return;
  const ids = order.filter(id => textOf(cards.get(id)).t);
  const last = ids.slice(-2);
  $('dots').style.display = last.length ? 'none' : 'flex';
  const lines = $('lines'); lines.innerHTML = '';
  last.forEach((id, idx) => {
    const r = textOf(cards.get(id));
    const div = document.createElement('div');
    div.className = 'line ' + (idx === last.length-1 ? ('cur ' + (r.staff ? 'staff' : 'self')) : 'prev');
    div.textContent = r.t;
    lines.appendChild(div);
  });
}

/* ---- WS ---- */
function connect(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/viewer?session=${sessionId}`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => { ws.send(JSON.stringify({ type:'desk-viewer-start' })); }; // 호스트 캡처 원격 시작 요청(마이크는 호스트)
  ws.onclose = () => { if (started) setTimeout(connect, 1500); };
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'snapshot') (m.items||[]).forEach(upsert);
    else if (m.type === 'sentence') upsert(m);
    else if (m.type === 'meta') applySxInfo(m.sxInfo);
    else if (m.type === 'wayfind') showWayfind(m);  // 길안내(시설 질문 감지) → 맵 오버레이
    else if (m.type === 'desk-reset') { hideWayfind(); backToTouch(); } // 대화 종료(무음) → 터치 화면으로
  };
}
// 대화 종료 시: 발화대기(점) 화면이 아니라 시작(터치) 화면으로 복귀 (전체화면은 유지)
function backToTouch(){
  started = false;
  try { ws && ws.close(); } catch {}
  cards.clear(); order = [];
  show('startWrap');
}

/* ---- 길안내 맵(방법2: 자동 오버레이) ---- */
let mapApi = null, mapTimer = null, mapLoading = false;
function loadMapScripts(cb){
  if (window.AirportMap25D && window.AIRPORT_DATA) return cb();
  if (mapLoading) { setTimeout(()=>loadMapScripts(cb), 200); return; }
  mapLoading = true;
  let n = 0; const done = () => { if (++n >= 2) { mapLoading = false; cb(); } };
  for (const src of ['/map/wayfinding_data.js', '/map/airport25d.js']) {
    const s = document.createElement('script'); s.src = src; s.onload = done; s.onerror = done; document.head.appendChild(s);
  }
}
function showWayfind(m){
  $('mapOverlay').style.display = 'flex';
  loadMapScripts(() => {
    try {
      if (!mapApi && window.AirportMap25D && window.AIRPORT_DATA) mapApi = AirportMap25D.create({ container:'#map', data:window.AIRPORT_DATA, lang: curLang });
      if (!mapApi) return;
      try { mapApi.setLang(curLang); } catch {}
      mapApi.showRoute({ deskFloor: m.deskFloor||'1F', deskSide: m.deskSide||'S', dest: m.dests });
      // 경로만 안내(거리/시간 표시 안 함). 다른 층이면 'N층' 안내.
      const floorKo = m.floor ? m.floor.replace('F','층') : '';
      $('mapCap').textContent = (m.ko || '') + (m.sameFloor === false && floorKo ? ` · ${floorKo}` : '');
    } catch (e) {}
  });
  clearTimeout(mapTimer);
  mapTimer = setTimeout(hideWayfind, 20000); // 20초 후 자동 닫힘(새 길안내 오면 교체)
}
function hideWayfind(){
  clearTimeout(mapTimer);
  $('mapOverlay').style.display = 'none';
  try { mapApi && mapApi.clearRoute(); } catch {}
}

/* ---- 전체화면 ---- */
function goFullscreen(){
  if (isStandalone()) return;
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (fn) { try { fn.call(el); } catch {} }
}

function start(){
  if (started) return;
  started = true;
  goFullscreen();
  show('stage');
  connect(); // 마이크는 호스트에서 캡처 → 뷰어는 표시만 + 원격 시작 신호
}
function end(){
  started = false;
  hideWayfind();
  try { ws && ws.send(JSON.stringify({ type:'desk-viewer-stop' })); } catch {}
  try { ws && ws.close(); } catch {}
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document);
  }
  cards.clear(); order = [];
  // 세션이 URL 고정이면 시작화면, 아니면 랜딩으로
  show(params.get('session') ? 'startWrap' : 'landing');
}

/* ---- 랜딩(세션 선택) ---- */
let roomsPoll = null;
async function loadRooms(){
  const box = $('rooms');
  try {
    const list = await fetch('/api/desk-sessions').then(r => r.json());
    box.innerHTML = '';
    if (!list.length) { box.innerHTML = '<div id="roomsEmpty">등록된 안내데스크가 없습니다.</div>'; return; }
    list.forEach(s => {
      const b = document.createElement('button');
      // active=호스트(안내원) 대기 중일 때만 선택 가능
      b.className = 'room' + (s.active ? '' : ' off');
      b.innerHTML = esc(s.title) + (s.active ? '' : '<span class="tag">안내원 준비 중</span>');
      if (s.active) {
        b.addEventListener('click', () => {
          if (roomsPoll) { clearInterval(roomsPoll); roomsPoll = null; }
          sessionId = s.id; const mf=$('manifest'); if(mf) mf.href='/desk.webmanifest?session='+encodeURIComponent(sessionId);
          goFullscreen(); show('startWrap');
        });
      } else b.disabled = true;
      box.appendChild(b);
    });
  } catch { box.innerHTML = '<div id="roomsEmpty">목록을 불러오지 못했습니다.</div>'; }
}
function esc(s){ return String(s).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

/* ---- 종료 버튼 자동 숨김 ---- */
let endTimer = null;
function flashEnd(){ $('endBtn').classList.add('show'); clearTimeout(endTimer); endTimer = setTimeout(() => $('endBtn').classList.remove('show'), 3000); }

$('startBtn').addEventListener('click', start);
$('endBtn').addEventListener('click', end);
$('stage').addEventListener('click', flashEnd);
$('mapOverlay').addEventListener('click', hideWayfind); // 탭하면 바로 닫기

// 진입: 세션이 지정돼 있으면 시작화면, 아니면 랜딩(+호스트 활성 주기적 갱신)
if (sessionId) show('startWrap');
else { show('landing'); loadRooms(); roomsPoll = setInterval(loadRooms, 4000); }
</script>
</body>
</html>
