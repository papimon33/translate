<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAC Desk</title>
<style>
  :root { --bg:#0b0e14; --fg:#f3f5fa; --muted:#8a93a6; --accent:#7c9cff; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-user-select:none; user-select:none; overscroll-behavior:none; }
  /* 시작 버튼(하나) */
  #startWrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; }
  #startBtn { border:none; cursor:pointer; color:#fff; font-weight:800;
    background:linear-gradient(135deg,#7c9cff,#9b87ff); border-radius:28px;
    padding:34px 56px; font-size:30px; line-height:1.3; text-align:center;
    box-shadow:0 16px 50px rgba(124,156,255,.45); }
  #startBtn small { display:block; font-size:16px; font-weight:600; opacity:.9; margin-top:8px; }
  #startBtn .tap { display:block; font-size:40px; margin-bottom:10px; }
  /* 번역 표시 영역 */
  #stage { position:fixed; inset:0; display:none; flex-direction:column; justify-content:flex-end;
    padding:6vh 6vw calc(6vh + env(safe-area-inset-bottom)); gap:18px; }
  .line { line-height:1.4; word-break:keep-all; overflow-wrap:anywhere; }
  .line.prev { font-size:clamp(20px,4vw,40px); color:var(--muted); opacity:.55; }
  .line.cur  { font-size:clamp(32px,7vw,76px); font-weight:800; }
  .line.cur.staff { color:var(--accent); }          /* 안내원 → 외국인 언어 번역(주 정보) */
  .line.cur.self  { color:var(--fg); opacity:.85; } /* 외국인 자기 발화(원문) */
  #endBtn { position:fixed; top:calc(env(safe-area-inset-top) + 12px); right:14px; z-index:11;
    display:none; width:40px; height:40px; border-radius:12px; border:1px solid #2a3242;
    background:rgba(20,24,33,.6); color:var(--muted); font-size:20px; align-items:center; justify-content:center; }
</style>
</head>
<body>
  <div id="startWrap">
    <button id="startBtn">
      <span class="tap">👆</span>
      Touch to start
      <small>请触摸开始 · タッチして開始 · Chạm để bắt đầu</small>
    </button>
  </div>
  <div id="stage"></div>
  <div id="endBtn">✕</div>

<script>
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
const sessionId = params.get('session') || 'default';
const LABEL = { ko:'한국어', en:'English', ja:'日本語', zh:'中文', vi:'Tiếng Việt', th:'ไทย', tl:'Filipino', id:'Bahasa', ru:'Русский', ms:'Melayu' };

let curLang = 'ko';        // 외국인(뷰어) 표시 언어 = 감지된 B
let started = false;
let ws = null;
const cards = new Map();    // id -> {texts, source, staff}
let order = [];

function applySxInfo(info){
  if (!info) return;
  if (info.mode === 'two') curLang = info.b || curLang; // 데스크 뷰어는 외국인 언어(B)
  render();
}
function textOf(c){
  if (c.texts && c.texts[curLang]) return { t: c.texts[curLang], staff: true };   // 안내원 답변(외국인 언어)
  if (c.source) return { t: c.source, staff: false };                             // 외국인 자기 발화(원문)
  return { t: '', staff: false };
}
function upsert(item){
  let c = cards.get(item.id);
  if (!c) { c = {}; cards.set(item.id, c); order.push(item.id); }
  c.texts = item.texts || {};
  c.source = item.source || '';
  render();
}
function clearAll(){ cards.clear(); order = []; render(); }
function render(){
  if (!started) return;
  const stage = $('stage');
  // 최근 발화만: 현재(큰 글씨) + 직전 1개(흐리게)
  const ids = order.filter(id => { const r = textOf(cards.get(id)); return r.t; });
  const last = ids.slice(-2);
  stage.innerHTML = '';
  last.forEach((id, idx) => {
    const c = cards.get(id); const r = textOf(c);
    const div = document.createElement('div');
    const isCur = idx === last.length - 1;
    div.className = 'line ' + (isCur ? ('cur ' + (r.staff ? 'staff' : 'self')) : 'prev');
    div.textContent = r.t;
    stage.appendChild(div);
  });
}

function connect(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/viewer?session=${sessionId}`);
  ws.onclose = () => { if (started) setTimeout(connect, 1500); };
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'snapshot') { (m.items||[]).forEach(upsert); }
    else if (m.type === 'sentence') upsert(m);
    else if (m.type === 'meta') applySxInfo(m.sxInfo);
    else if (m.type === 'desk-reset') clearAll();
  };
}

async function loadMeta(){
  try { const s = await fetch('/api/sessions/' + sessionId).then(r => r.json());
    if (s && s.sxInfo) applySxInfo(s.sxInfo);
  } catch {}
}

function start(){
  if (started) return;
  started = true;
  $('startWrap').style.display = 'none';
  $('stage').style.display = 'flex';
  $('endBtn').style.display = 'flex';
  const el = document.documentElement;
  const fs = el.requestFullscreen || el.webkitRequestFullscreen;
  if (fs) { try { fs.call(el); } catch {} }
  loadMeta();
  connect();
}
function end(){
  started = false;
  try { ws && ws.close(); } catch {}
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document);
  }
  $('stage').style.display = 'none';
  $('endBtn').style.display = 'none';
  $('startWrap').style.display = 'flex';
}

$('startBtn').addEventListener('click', start);
$('endBtn').addEventListener('click', end);
</script>
</body>
</html>
