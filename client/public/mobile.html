<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>KAC Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0f1115; --panel:#181b22; --line:#272b35; --txt:#e8eaf0; --muted:#8b93a7; --accent:#4f8cff; --accent2:#36d399; --fs:19px;
    --bubStaff:#232a52; --bubStaffFg:#c7ccff; --bubSelf:#232833; --bubSelfFg:#e8eaf0; }
  [data-theme="light"] { --bg:#fff; --panel:#f5f6f8; --line:#e1e4ea; --txt:#1a1d24; --muted:#6b7280; --accent:#2563eb; --accent2:#059669;
    --bubStaff:#eef2ff; --bubStaffFg:#3730a3; --bubSelf:#eef1f5; --bubSelfFg:#1a1d24; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Noto Sans KR',system-ui,'Segoe UI',sans-serif; background:var(--bg); color:var(--txt); }
  header { position:sticky; top:0; z-index:6; background:var(--bg); padding:12px 16px 8px; border-bottom:1px solid var(--line); }
  .htop { display:flex; align-items:center; gap:10px; }
  .brand { font-size:16px; font-weight:800; flex:1; }
  .stitle { font-size:14px; font-weight:700; color:var(--muted); margin-top:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .iconbtn { width:38px; height:38px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--txt); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .iconbtn svg { width:20px; height:20px; }
  .iconbtn.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  #audioBtn:not(.on) #audioWave { opacity:0.25; }
  /* 언어 방향 라벨(선택 대신 표시) */
  #langLabel { width:100%; margin-top:8px; padding:9px 10px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel); color:var(--txt); font-size:14px; font-weight:700; text-align:center; }
  /* 호스트 중지 배너 */
  #hostBanner { position:sticky; top:0; z-index:7; margin:0; padding:9px 14px; text-align:center;
    font-size:13px; font-weight:700; color:#fff; background:#ef4444; }
  /* 폰 PTT(누르고 말하기) — 녹음 아이콘 버튼 */
  body { padding-bottom:100px; }
  #pttBtn { position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:25; display:none;
    width:68px; height:68px; border-radius:50%; border:none; background:var(--accent); color:#fff;
    box-shadow:0 8px 24px rgba(0,0,0,.35); cursor:pointer; touch-action:none; user-select:none;
    -webkit-user-select:none; -webkit-tap-highlight-color:transparent; align-items:center; justify-content:center; }
  #pttBtn svg { width:30px; height:30px; }
  #pttBtn.rec { background:#ef4444; transform:translateX(-50%) scale(1.08);
    box-shadow:0 0 0 10px rgba(239,68,68,.25), 0 8px 24px rgba(0,0,0,.35); }
  #pttBtn.disabled { opacity:0.35; pointer-events:none; }
  select#langSel { width:100%; margin-top:8px; padding:9px 10px; border-radius:9px; border:1px solid var(--line); background:var(--panel); color:var(--txt); font-size:15px; font-family:inherit; }

  #feed { display:flex; flex-direction:column; gap:8px; padding:14px 14px 4px; }
  .msg { max-width:92%; }
  .msg .spk { display:inline-flex; align-items:center; gap:3px; font-size:calc(var(--fs) - 8px); font-weight:800; color:#fff; background:var(--accent); border-radius:10px; padding:1px 8px; margin-bottom:3px; }
  .msg .spk svg { width:13px; height:13px; }
  .msg .line { font-size:var(--fs); line-height:1.5; color:var(--txt); }
  .msg .line.pending { color:var(--muted); font-style:italic; }
  .msg.latest .line { color:var(--accent); font-weight:700; }
  .msg.latest .line.pending { color:var(--muted); font-weight:400; }
  .msg .src { font-size:calc(var(--fs) - 5px); color:var(--muted); line-height:1.4; margin-top:2px; }
  #partial { padding:4px 16px 28px; }
  #partial .line { font-size:var(--fs); color:var(--muted); font-style:italic; line-height:1.4; }
  .empty { color:var(--muted); text-align:center; padding:60px 20px; font-size:14px; }

  /* 설정 시트 */
  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:20; }
  .backdrop.show { display:block; }
  .sheet { position:fixed; left:0; right:0; bottom:0; z-index:21; background:var(--panel); border-top-left-radius:18px; border-top-right-radius:18px; padding:18px 18px 28px; transform:translateY(100%); transition:transform .22s; }
  .sheet.show { transform:translateY(0); }
  .sheet h3 { margin:4px 0 14px; font-size:16px; }
  .srow { display:flex; align-items:center; justify-content:space-between; padding:13px 2px; border-top:1px solid var(--line); }
  .srow:first-of-type { border-top:none; }
  .srow .lbl { font-size:15px; }
  .srow.click { cursor:pointer; }
  .srow.click:active { background:rgba(127,127,127,.12); }
  .stepper { display:flex; align-items:center; gap:10px; }
  .stepper button { width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--txt); font-size:18px; cursor:pointer; }
  .stepper .v { font-size:14px; color:var(--muted); min-width:42px; text-align:center; }
  .linkbtn { border:1px solid var(--line); background:var(--bg); color:var(--txt); border-radius:9px; padding:8px 14px; font-size:14px; cursor:pointer; }
  /* 스위치 */
  .sw { position:relative; width:46px; height:26px; pointer-events:none; }
  .sw input { opacity:0; width:0; height:0; }
  .sw .sl { position:absolute; inset:0; background:var(--bg); border:1px solid var(--line); border-radius:26px; transition:.18s; cursor:pointer; }
  .sw .sl:before { content:''; position:absolute; width:19px; height:19px; left:3px; top:2.5px; background:var(--muted); border-radius:50%; transition:.18s; }
  .sw input:checked + .sl { background:var(--accent); border-color:var(--accent); }
  .sw input:checked + .sl:before { transform:translateX(20px); background:#fff; }

  /* QR 모달 */
  .qrm { position:fixed; inset:0; z-index:30; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; padding:20px; }
  .qrm.show { display:flex; }
  .qrbox { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:26px 22px 22px; width:320px; max-width:92vw; text-align:center; }
  .qrx { position:absolute; top:10px; right:10px; width:34px; height:34px; border-radius:9px; border:none; background:transparent; color:var(--muted); font-size:22px; cursor:pointer; }
  .qrbox img { width:230px; max-width:100%; background:#fff; border-radius:12px; padding:10px; }
  .qrbox input { width:100%; margin-top:16px; padding:11px 12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--txt); font-size:13px; text-align:center; }
  .qrbox .copy { width:100%; margin-top:10px; padding:12px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-weight:700; font-size:15px; cursor:pointer; }

  /* 데스크 뷰어: 언어 pill(라이브 점) + 안내원/손님 말풍선 + 인라인 지도 */
  #langLabel.pill { display:inline-flex; align-items:center; justify-content:center; gap:8px; width:auto; margin:8px auto 0; padding:7px 15px; border-radius:22px; }
  #langLabel .dot { width:7px; height:7px; border-radius:50%; background:var(--accent2); flex:0 0 auto; animation:pulseDot 1.4s infinite ease-in-out; }
  @keyframes pulseDot { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.4; transform:scale(.75); } }
  .msg.turn { max-width:100%; display:flex; flex-direction:column; }
  .msg.turn.staff { align-items:flex-start; }
  .msg.turn.self  { align-items:flex-end; }
  .msg.turn .who { font-size:calc(var(--fs) - 7px); color:var(--muted); font-weight:800; margin:0 5px 3px; }
  .msg.turn .line { max-width:90%; padding:9px 13px; border-radius:16px; font-weight:700; line-height:1.4; }
  .msg.turn.staff .line { background:var(--bubStaff); color:var(--bubStaffFg); border-bottom-left-radius:5px; }
  .msg.turn.self  .line { background:var(--bubSelf);  color:var(--bubSelfFg);  border-bottom-right-radius:5px; }
  .msg.turn.staff .line.pending, .msg.turn.self .line.pending { opacity:.6; font-style:normal; }
  .mapCard { margin:12px 0 4px; border:1px solid var(--line); border-radius:16px; overflow:hidden; background:var(--panel); }
  .mapCard .mHead { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line); }
  .mapCard .mHead .mIco { color:var(--accent); display:inline-flex; flex:0 0 auto; }
  .mapCard .mHead .mName { font-weight:800; font-size:calc(var(--fs) - 3px); color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mapCard .mHead .mChips { margin-left:auto; display:flex; gap:6px; flex:0 0 auto; }
  .mapCard .mHead .chip { background:var(--bg); border:1px solid var(--line); color:var(--muted); font-size:12px; font-weight:700; padding:3px 9px; border-radius:14px; white-space:nowrap; }
  .mapCard .mHolder { height:300px; overflow:hidden; }
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="brand" id="brand">KAC Translator</div>
    <button class="iconbtn" id="audioBtn" aria-label="음성 듣기" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path id="audioWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </button>
    <button class="iconbtn" id="settingsBtn" aria-label="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="stitle" id="title">세션</div>
  <select id="langSel"></select>
  <div id="langLabel" style="display:none"></div>
</header>

<div id="hostBanner" style="display:none">번역이 중지되었습니다</div>
<div id="feed"><div class="empty" id="empty">번역을 기다리는 중입니다...</div></div>
<div id="partial"></div>
<button id="pttBtn" aria-label="누르고 말하기">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
</button>

<!-- 설정 시트 -->
<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <h3>설정</h3>
  <div class="srow">
    <span class="lbl">글자 크기</span>
    <div class="stepper">
      <button id="fsDown">−</button><span class="v" id="fsVal">100%</span><button id="fsUp">+</button>
    </div>
  </div>
  <div class="srow click" id="rowQr">
    <span class="lbl">QR코드 보기</span>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
  <div class="srow click" id="rowFull">
    <span class="lbl">전체화면</span>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
  <div class="srow click" id="rowSrc">
    <span class="lbl">원문 동시 보기</span>
    <label class="sw"><input type="checkbox" id="srcToggle" /><span class="sl"></span></label>
  </div>
  <div class="srow click" id="rowDark">
    <span class="lbl">다크 모드</span>
    <label class="sw"><input type="checkbox" id="darkToggle" /><span class="sl"></span></label>
  </div>
</div>

<!-- QR 모달 -->
<div class="qrm" id="qrModal">
  <div class="qrbox">
    <button class="qrx" id="qrClose">×</button>
    <img id="qrImg" alt="QR" />
    <input id="qrLink" type="text" readonly />
    <button class="copy" id="qrCopy">링크 복사</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const sessionId = params.get('session') || 'default';
const ALL4 = ['ko','en','ja','zh'];
const LABEL = { ko:'한국어', en:'English', ja:'日本語', zh:'中文', es:'Español', fr:'Français', de:'Deutsch', ru:'Русский', vi:'Tiếng Việt', th:'ไทย', id:'Indonesia' };

const $ = (id) => document.getElementById(id);
const feed=$('feed'), empty=$('empty'), partialEl=$('partial'), langSel=$('langSel'), titleEl=$('title');
const cards = new Map(); // id -> {el, line, src, texts, source}
let order = []; // 표시 순서 id 목록
let latestId = null;
let curLang = 'ko';
let sessionPipeline = 'whisper';
let sessionOutLang = 'ko';
let speakerNames = {}; // 화자번호 -> 지정이름
function spkLabel(id){ return id ? (speakerNames[id] || ('화자 '+id)) : ''; }

/* 브랜드(플레이스홀더 — 운영 시 교체) */
const BRAND = { name: 'KAC Translator' };
$('brand').textContent = BRAND.name;

/* 데스크 길안내: 시설 라벨/문구 현지화(손님 언어, en 폴백) + 인라인 지도 */
const isDesk = () => sessionPipeline === 'desk';
const CAT_EN = { restroom:'Restroom', smoking:'Smoking area', pharmacy:'Pharmacy', convenience:'Convenience store', exchange:'Currency exchange', charging:'Charging station', lounge:'Lounge', nursing:'Nursing room', prayer:'Prayer room', water:'Water fountain', security:'Security check', immigration:'Immigration', customs:'Customs', duty_free:'Duty free', info_desk:'Information', baggage:'Baggage claim', gate:'Gate', food:'Restaurant', ticket:'Bus tickets', wheelchair:'Wheelchair', stroller:'Stroller', aed:'AED', elevator:'Elevator', escalator:'Escalator', stairs:'Stairs' };
const DUI = {
  interpreting:{ko:'통역 중',en:'Interpreting',ja:'通訳中',zh:'翻译中',vi:'Đang dịch'},
  staff:{ko:'안내원',en:'Staff',ja:'案内係',zh:'工作人员',vi:'Nhân viên'},
  you:{ko:'나',en:'You',ja:'あなた',zh:'您',vi:'Bạn'},
  walk:{ko:'도보',en:'Walk',ja:'徒歩',zh:'步行',vi:'Đi bộ'},
  min:{ko:'분',en:' min',ja:'分',zh:'分钟',vi:' phút'},
};
function dt(k){ const d = DUI[k] || {}; return d[curLang] || d.en || d.ko || k; }
function catLabel(m){ return (curLang === 'ko') ? (m.ko||'') : (CAT_EN[m.category] || m.ko || ''); }
function floorLbl(f){ const n = String(f||'').replace(/[^0-9]/g,''); if(!n) return f||''; return curLang==='ko' ? (n+'층') : (n+'F'); }

let mapApi = null, mapLoading = false, mapBlock = null;
function loadMapScripts(cb){
  if (window.AirportMap25D && window.AIRPORT_DATA) return cb();
  if (mapLoading) { setTimeout(()=>loadMapScripts(cb), 200); return; }
  mapLoading = true; let n = 0; const done = () => { if (++n >= 2) { mapLoading = false; cb(); } };
  for (const src of ['/map/wayfinding_data.js','/map/airport25d.js']) { const s=document.createElement('script'); s.src=src; s.onload=done; s.onerror=done; document.head.appendChild(s); }
}
function ensureMapBlock(){
  if (mapBlock) return mapBlock;
  mapBlock = document.createElement('div'); mapBlock.className = 'mapCard';
  const head = document.createElement('div'); head.className = 'mHead';
  head.innerHTML = '<span class="mIco"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span><span class="mName"></span><span class="mChips"></span>';
  const holder = document.createElement('div'); holder.className = 'mHolder';
  mapBlock.appendChild(head); mapBlock.appendChild(holder); mapBlock._holder = holder; mapBlock._head = head;
  return mapBlock;
}
function fillMapHead(m, res){
  if (!mapBlock) return;
  mapBlock._head.querySelector('.mName').textContent = catLabel(m) + ' · ' + floorLbl(m.floor);
  const chips = mapBlock._head.querySelector('.mChips'); chips.textContent = '';
  const sums = (res && res.summaries) || [];
  if (sums.length){ const best = sums.reduce((a,b)=>(b&&a&&b.meters<a.meters?b:a), sums[0]);
    if (best){ let html = '<span class="chip">'+dt('walk')+' '+Math.max(1,Math.round(best.minutes||0))+dt('min')+'</span>'; if(best.meters) html+='<span class="chip">'+Math.round(best.meters)+' m</span>'; chips.innerHTML = html; } }
}
function showWayfind(m){
  loadMapScripts(() => {
    const block = ensureMapBlock(); feed.appendChild(block); scrollDown();
    const doRoute = () => { try { mapApi.setLang(curLang); const res = mapApi.showRoute({ deskFloor:m.deskFloor||'1F', deskSide:m.deskSide||'S', dest:m.dests }); fillMapHead(m,res); scrollDown(); } catch(e){} };
    if (mapApi) { doRoute(); return; }
    if (!window.AirportMap25D || !window.AIRPORT_DATA) return;
    mapApi = AirportMap25D.create({ container: block._holder, data: window.AIRPORT_DATA, lang: curLang, onReady: doRoute });
  });
}
function deskTextOf(c){
  if (c.texts && c.texts[curLang]) return { t:c.texts[curLang], staff:true };  // 안내원 답변(손님 언어)
  if (c.source) return { t:c.source, staff:false };                            // 손님 자기 발화(원문)
  const k = c.texts && Object.keys(c.texts); if (k && k.length) return { t:c.texts[k[0]], staff:true };
  return { t:'', staff:false };
}

/* ---- 설정 저장값 ---- */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('kac-theme', t); $('darkToggle').checked = (t==='dark'); }
const FS_BASE = 18; // 100% 기준 px
let fsPct = parseInt(localStorage.getItem('kac-mfs')||'100',10);
if(!(fsPct>=50 && fsPct<=200)) fsPct = 100; // 옛 px 저장값 보정
function applyFs(){ document.documentElement.style.setProperty('--fs', Math.round(FS_BASE*fsPct/100)+'px'); $('fsVal').textContent = fsPct+'%'; localStorage.setItem('kac-mfs', fsPct); }
let showSrc = localStorage.getItem('kac-msrc') === '1';
function applySrc(){ $('srcToggle').checked = showSrc; cards.forEach(c => { c.src.style.display = (showSrc && c.source) ? 'block':'none'; }); }

applyTheme(localStorage.getItem('kac-theme') || 'dark');
applyFs();

/* ---- 언어 select ---- */
// 번역 방향 라벨(언어 선택은 안 되므로 표시만): 단방향=→타깃, 양방향=A↔B
function applySxInfo(info){
  const el = $('langLabel');
  if (!info) { el.textContent = (sessionPipeline==='desk') ? '말씀하시면 통역됩니다' : '연결 대기 중…'; el.style.display='block'; return; }
  if (info.mode === 'two') {
    // 데스크 뷰어(외국인 태블릿)는 자기 언어(b)를 본다. 일반 soniox는 a(=ko).
    curLang = (sessionPipeline === 'desk') ? info.b : info.a;
    el.classList.add('pill');
    el.innerHTML = '<span class="dot"></span><span>' + (LABEL[info.a]||info.a) + ' ↔ ' + (LABEL[info.b]||info.b) + '</span>';
  } else {
    el.classList.remove('pill');
    if (sessionPipeline === 'desk') { curLang = 'ko'; el.textContent = '언어 감지 중… (말씀하세요)'; } // detect 단계
    else { curLang = info.target; el.textContent = '→ ' + (LABEL[info.target]||info.target); }
  }
  el.style.display = el.classList.contains('pill') ? 'flex' : 'block';
  rerender();
}
async function loadSession(){
  let title = 'KAC Translator', sxInfo = null;
  try { const s = await fetch('/api/sessions/'+sessionId).then(r=>r.json()); if (s){ if(s.title) title = s.title; if(s.pipeline) sessionPipeline = s.pipeline; if(s.outLang) sessionOutLang = s.outLang; sxInfo = s.sxInfo || null; speakerNames = s.speakers || {}; } } catch {}
  titleEl.textContent = title;
  langSel.style.display='none'; $('langLabel').style.display='none';
  if (sessionPipeline === 'translate') {
    // 실시간 통역: 단일 출력 언어 → 라벨만 표시
    curLang = sessionOutLang;
    $('langLabel').textContent = LABEL[curLang]||curLang; $('langLabel').style.display='block';
    $('audioBtn').style.display = 'flex';
  } else if (sessionPipeline === 'soniox') {
    // 다국어 번역: 방향 라벨 표시(선택 불가) + 음성 듣기 + 누르고 말하기
    applySxInfo(sxInfo);
    $('audioBtn').style.display = 'flex'; $('pttBtn').style.display = 'flex';
  } else if (sessionPipeline === 'desk') {
    // 데스크 안내: 외국인 자기 언어 자동 표시(입력은 호스트 마이크, 뷰어는 표시 전용)
    applySxInfo(sxInfo);
  } else {
    // whisper(구): 다국어 select 유지
    langSel.innerHTML=''; langSel.style.display='';
    const saved = localStorage.getItem('kac-mlang-'+sessionId);
    curLang = (saved && ALL4.includes(saved)) ? saved : 'ko';
    ALL4.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=LABEL[c]||c; langSel.appendChild(o); });
    langSel.value = curLang;
    langSel.onchange = () => { curLang = langSel.value; localStorage.setItem('kac-mlang-'+sessionId, curLang); rerender(); };
  }
  rerender();
}

/* ---- QR ---- */
async function loadQr(){
  try { const d = await fetch('/api/qr?session='+sessionId).then(r=>r.json());
    $('qrImg').src = d.qr; $('qrLink').value = d.url;
  } catch {}
}

// whisper: 선택 언어만 표시(대체 X). translate: 1개 언어만 저장 → 보유 텍스트로 폴백.
function pick(texts){
  if(!texts) return '';
  if(texts[curLang]) return texts[curLang];
  if(sessionPipeline === 'translate' || sessionPipeline === 'soniox'){ const k=Object.keys(texts); if(k.length) return texts[k[0]]; }
  return '';
}
function atBottom(){ return document.body.scrollHeight - window.scrollY - window.innerHeight < 160; }
function scrollDown(){ window.scrollTo(0, document.body.scrollHeight); }

function upsert(item){
  if(empty) empty.style.display='none';
  const stick = atBottom();
  let card = cards.get(item.id);
  if(!card){
    const el=document.createElement('div'); el.className='msg';
    const spk=document.createElement('div'); spk.className='spk'; el.appendChild(spk);
    const line=document.createElement('div'); line.className='line'; el.appendChild(line);
    const src=document.createElement('div'); src.className='src'; el.appendChild(src);
    feed.appendChild(el);
    card={el, line, src, spk}; cards.set(item.id, card); order.push(item.id);
    // 최신 강조 이동
    if(latestId && cards.get(latestId)) cards.get(latestId).el.classList.remove('latest');
    el.classList.add('latest'); latestId = item.id;
  }
  card.texts = item.texts || (item.text ? { [curLang]: item.text } : {});
  card.source = item.source || '';
  if(item.speaker) card.speaker = item.speaker;
  renderSpk(card);
  renderLine(card);
  card.src.textContent = card.source;
  card.src.style.display = (!isDesk() && showSrc && card.source) ? 'block' : 'none';
  if(stick) scrollDown();
}
function esc(s){ return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function renderSpk(c){ if(!c.spk) return; if(isDesk()) return; if(c.speaker){ c.spk.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/></svg>'+esc(spkLabel(c.speaker)); c.spk.style.display='inline-flex'; } else { c.spk.style.display='none'; } }
function rerenderSpk(){ cards.forEach(renderSpk); }
// 선택 언어 번역이 아직 없으면 원문을 흐리게(placeholder)
function renderLine(c){
  if (isDesk()){
    const r = deskTextOf(c);
    c.el.classList.add('turn');
    c.el.classList.toggle('staff', r.staff);
    c.el.classList.toggle('self', !r.staff);
    c.el.classList.remove('latest');
    if (c.spk){ c.spk.className = 'who'; c.spk.style.display = r.t ? '' : 'none'; c.spk.textContent = r.staff ? dt('staff') : (dt('you') + ' · ' + String(curLang).toUpperCase()); }
    c.line.className = 'line';
    c.line.textContent = r.t;
    if (c.src) c.src.style.display = 'none';
    c.el.style.display = r.t ? '' : 'none';
    return;
  }
  const txt = pick(c.texts);
  c.line.classList.toggle('pending', !txt && !!c.source);
  c.line.textContent = txt || c.source || '';
}
function rerender(){ cards.forEach(renderLine); }
// 데스크: 대화 종료 시 화면 초기화(다음 손님)
function clearAll(){ cards.forEach(c=>c.el.remove()); cards.clear(); order=[]; latestId=null; setPartial(''); if(mapBlock){ try{ mapBlock.remove(); }catch{} } if(empty) empty.style.display=''; }
function setPartial(text){ const s=atBottom(); partialEl.innerHTML = text ? ('<div class="line">'+text.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))+'</div>') : ''; if(s) scrollDown(); }

/* ---- 번역 음성 재생 (translate, 24kHz PCM16) ---- */
let audioOn = false;
let actx = null;
let outCursor = 0;
function enableAudio(){
  // 모바일 자동재생 정책: 사용자 탭(제스처) 안에서 컨텍스트 생성/재개해야 소리가 남
  if(!actx){ try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch {} }
  if(actx && actx.state==='suspended') actx.resume();
}
function sendAudioSub(on){ try { if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'audioSub', on:!!on})); } catch {} }
function playPcm24(b64){
  if(!actx) return;
  try {
    const bin = atob(b64); const n = bin.length>>1;
    const buf = actx.createBuffer(1, n, 24000); const ch = buf.getChannelData(0);
    for(let i=0;i<n;i++){ let s=(bin.charCodeAt(i*2+1)<<8)|bin.charCodeAt(i*2); if(s>=0x8000) s-=0x10000; ch[i]=s/32768; }
    const node = actx.createBufferSource(); node.buffer=buf; node.connect(actx.destination);
    const now = actx.currentTime; if(outCursor<now) outCursor=now+0.08;
    node.start(outCursor); outCursor += buf.duration;
  } catch {}
}

/* ---- WS ---- */
let ws;
function connect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/viewer?session=${sessionId}`);
  ws.onopen = () => { if(audioOn) sendAudioSub(true); }; // 재접속 시 구독 복원
  ws.onclose = () => setTimeout(connect, 1500);
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if(m.type==='snapshot'){ m.items.forEach(it => upsert(it)); }
    else if(m.type==='partial'){ setPartial(m.text); }
    else if(m.type==='sentence'){ setPartial(''); upsert(m); }
    else if(m.type==='audio'){ if(audioOn) playPcm24(m.b64); }
    else if(m.type==='meta'){ if(sessionPipeline==='soniox' || sessionPipeline==='desk') applySxInfo(m.sxInfo); }
    else if(m.type==='wayfind'){ if(isDesk()) showWayfind(m); }
    else if(m.type==='desk-reset'){ clearAll(); }
    else if(m.type==='speakers'){ speakerNames = m.speakers || {}; rerenderSpk(); }
    else if(m.type==='host'){ setHostActive(m.active); }
  };
}
// 호스트(번역) 활성/중지 → 배너 + 누르고말하기 버튼 활성/비활성
function setHostActive(active){
  $('hostBanner').style.display = active ? 'none' : 'block';
  const pb = $('pttBtn');
  if(active){ pb.classList.remove('disabled'); }
  else { if(pttActive) pttStop(); pb.classList.add('disabled'); }
}

/* ---- 설정 UI ---- */
function openSheet(){ $('backdrop').classList.add('show'); $('sheet').classList.add('show'); }
function closeSheet(){ $('backdrop').classList.remove('show'); $('sheet').classList.remove('show'); }
$('settingsBtn').onclick = openSheet;
$('backdrop').onclick = closeSheet;
$('fsUp').onclick = (e) => { e.stopPropagation(); fsPct = Math.min(200, fsPct+10); applyFs(); };
$('fsDown').onclick = (e) => { e.stopPropagation(); fsPct = Math.max(50, fsPct-10); applyFs(); };
// QR / 원문 / 다크모드: 행 전체 클릭으로 동작
$('rowQr').onclick = () => { closeSheet(); $('qrModal').classList.add('show'); };
$('rowFull').onclick = () => {
  closeSheet();
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (fsEl) { (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document); return; }
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (fn) { try { fn.call(el); } catch {} }
};
$('rowSrc').onclick = () => { showSrc = !showSrc; $('srcToggle').checked = showSrc; localStorage.setItem('kac-msrc', showSrc?'1':'0'); applySrc(); };
$('audioBtn').onclick = () => { audioOn = !audioOn; $('audioBtn').classList.toggle('on', audioOn); if(audioOn) enableAudio(); sendAudioSub(audioOn); };
$('rowDark').onclick = () => { applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); };
$('qrClose').onclick = () => $('qrModal').classList.remove('show');
$('qrModal').onclick = (e) => { if(e.target.id==='qrModal') $('qrModal').classList.remove('show'); };
$('qrCopy').onclick = async () => {
  const link = $('qrLink').value;
  try { await navigator.clipboard.writeText(link); } catch { const i=$('qrLink'); i.select(); document.execCommand('copy'); }
  const b=$('qrCopy'); const t=b.textContent; b.textContent='복사됨!'; setTimeout(()=>b.textContent=t, 1200);
};

/* ---- 폰 PTT: 누르고 말하기 → 마이크 오디오를 24kHz PCM16 으로 서버에 전송 ---- */
let pttActive=false, pttStream=null, pttCtx=null, pttProc=null;
function f32to16(f32){ const b=new ArrayBuffer(f32.length*2), v=new DataView(b); for(let i=0;i<f32.length;i++){ let s=Math.max(-1,Math.min(1,f32[i])); s=s<0?s*0x8000:s*0x7fff; v.setInt16(i*2,s,true);} return b; }
function ds24(f32,rate){ if(rate===24000) return f32; const r=rate/24000, n=Math.round(f32.length/r), o=new Float32Array(n); for(let i=0;i<n;i++){ const idx=i*r, i0=Math.floor(idx), i1=Math.min(i0+1,f32.length-1); o[i]=f32[i0]*(1-(idx-i0))+f32[i1]*(idx-i0);} return o; }
async function pttStart(){
  if(pttActive) return;
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true } }); }
  catch(e){ alert('마이크 권한이 필요합니다. (HTTPS에서만 동작해요)'); return; }
  pttActive=true; pttStream=stream; $('pttBtn').classList.add('rec');
  try { if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'ptt', on:true})); } catch {}
  pttCtx = new (window.AudioContext||window.webkitAudioContext)();
  const rate = pttCtx.sampleRate;
  const node = pttCtx.createMediaStreamSource(stream);
  pttProc = pttCtx.createScriptProcessor(4096,1,1);
  node.connect(pttProc); const g=pttCtx.createGain(); g.gain.value=0; pttProc.connect(g); g.connect(pttCtx.destination);
  pttProc.onaudioprocess = (e)=>{ if(!pttActive || !ws || ws.readyState!==1) return; ws.send(f32to16(ds24(e.inputBuffer.getChannelData(0), rate))); };
}
function pttStop(){
  if(!pttActive) return; pttActive=false;
  $('pttBtn').classList.remove('rec');
  try { if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'ptt', on:false})); } catch {}
  try { pttProc.onaudioprocess=null; } catch {}
  try { pttStream.getTracks().forEach(t=>t.stop()); } catch {}
  try { pttCtx.close(); } catch {}
  pttStream=pttCtx=pttProc=null;
}
(function(){ const b=$('pttBtn');
  b.addEventListener('pointerdown',(e)=>{ e.preventDefault(); pttStart(); });
  b.addEventListener('pointerup',(e)=>{ e.preventDefault(); pttStop(); });
  b.addEventListener('pointercancel',()=>pttStop());
  b.addEventListener('pointerleave',()=>{ if(pttActive) pttStop(); });
})();

applySrc();
loadSession();
loadQr();
connect();
</script>
