<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>KAC Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0f1115; --panel:#181b22; --line:#272b35; --txt:#e8eaf0; --muted:#8b93a7; --accent:#4f8cff; --accent2:#36d399; --fs:19px; }
  [data-theme="light"] { --bg:#fff; --panel:#f5f6f8; --line:#e1e4ea; --txt:#1a1d24; --muted:#6b7280; --accent:#2563eb; --accent2:#059669; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Noto Sans KR',system-ui,'Segoe UI',sans-serif; background:var(--bg); color:var(--txt); }
  header { position:sticky; top:0; z-index:6; background:var(--bg); padding:12px 16px 8px; border-bottom:1px solid var(--line); }
  .htop { display:flex; align-items:center; gap:10px; }
  .brand { font-size:16px; font-weight:800; flex:1; }
  .stitle { font-size:14px; font-weight:700; color:var(--muted); margin-top:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .iconbtn { width:38px; height:38px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--txt); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .iconbtn svg { width:20px; height:20px; }
  select#langSel { width:100%; margin-top:8px; padding:9px 10px; border-radius:9px; border:1px solid var(--line); background:var(--panel); color:var(--txt); font-size:15px; font-family:inherit; }

  #feed { display:flex; flex-direction:column; gap:8px; padding:14px 14px 4px; }
  .msg { max-width:92%; }
  .msg .line { font-size:var(--fs); line-height:1.5; color:var(--txt); }
  .msg .line.pending { color:var(--muted); font-style:italic; }
  .msg.latest .line { color:var(--accent); font-weight:700; }
  .msg.latest .line.pending { color:var(--muted); font-weight:400; }
  .msg .src { font-size:calc(var(--fs) - 5px); color:var(--muted); line-height:1.4; margin-top:2px; }
  #partial { padding:4px 16px 28px; }
  #partial .line { font-size:var(--fs); color:var(--muted); font-style:italic; line-height:1.4; }
  .empty { color:var(--muted); text-align:center; padding:60px 20px; font-size:14px; }

  /* 설정 시트 */
  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:20; }
  .backdrop.show { display:block; }
  .sheet { position:fixed; left:0; right:0; bottom:0; z-index:21; background:var(--panel); border-top-left-radius:18px; border-top-right-radius:18px; padding:18px 18px 28px; transform:translateY(100%); transition:transform .22s; }
  .sheet.show { transform:translateY(0); }
  .sheet h3 { margin:4px 0 14px; font-size:16px; }
  .srow { display:flex; align-items:center; justify-content:space-between; padding:13px 2px; border-top:1px solid var(--line); }
  .srow:first-of-type { border-top:none; }
  .srow .lbl { font-size:15px; }
  .srow.click { cursor:pointer; }
  .srow.click:active { background:rgba(127,127,127,.12); }
  .stepper { display:flex; align-items:center; gap:10px; }
  .stepper button { width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--txt); font-size:18px; cursor:pointer; }
  .stepper .v { font-size:14px; color:var(--muted); min-width:42px; text-align:center; }
  .linkbtn { border:1px solid var(--line); background:var(--bg); color:var(--txt); border-radius:9px; padding:8px 14px; font-size:14px; cursor:pointer; }
  /* 스위치 */
  .sw { position:relative; width:46px; height:26px; pointer-events:none; }
  .sw input { opacity:0; width:0; height:0; }
  .sw .sl { position:absolute; inset:0; background:var(--bg); border:1px solid var(--line); border-radius:26px; transition:.18s; cursor:pointer; }
  .sw .sl:before { content:''; position:absolute; width:19px; height:19px; left:3px; top:2.5px; background:var(--muted); border-radius:50%; transition:.18s; }
  .sw input:checked + .sl { background:var(--accent); border-color:var(--accent); }
  .sw input:checked + .sl:before { transform:translateX(20px); background:#fff; }

  /* QR 모달 */
  .qrm { position:fixed; inset:0; z-index:30; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; padding:20px; }
  .qrm.show { display:flex; }
  .qrbox { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:26px 22px 22px; width:320px; max-width:92vw; text-align:center; }
  .qrx { position:absolute; top:10px; right:10px; width:34px; height:34px; border-radius:9px; border:none; background:transparent; color:var(--muted); font-size:22px; cursor:pointer; }
  .qrbox img { width:230px; max-width:100%; background:#fff; border-radius:12px; padding:10px; }
  .qrbox input { width:100%; margin-top:16px; padding:11px 12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--txt); font-size:13px; text-align:center; }
  .qrbox .copy { width:100%; margin-top:10px; padding:12px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-weight:700; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="brand">KAC Translator</div>
    <button class="iconbtn" id="settingsBtn" aria-label="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="stitle" id="title">세션</div>
  <select id="langSel"></select>
</header>

<div id="feed"><div class="empty" id="empty">번역을 기다리는 중입니다...</div></div>
<div id="partial"></div>

<!-- 설정 시트 -->
<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <h3>설정</h3>
  <div class="srow">
    <span class="lbl">글자 크기</span>
    <div class="stepper">
      <button id="fsDown">−</button><span class="v" id="fsVal">100%</span><button id="fsUp">+</button>
    </div>
  </div>
  <div class="srow click" id="rowQr">
    <span class="lbl">QR코드 보기</span>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
  <div class="srow click" id="rowSrc">
    <span class="lbl">원문 동시 보기</span>
    <label class="sw"><input type="checkbox" id="srcToggle" /><span class="sl"></span></label>
  </div>
  <div class="srow click" id="rowDark">
    <span class="lbl">다크 모드</span>
    <label class="sw"><input type="checkbox" id="darkToggle" /><span class="sl"></span></label>
  </div>
</div>

<!-- QR 모달 -->
<div class="qrm" id="qrModal">
  <div class="qrbox">
    <button class="qrx" id="qrClose">×</button>
    <img id="qrImg" alt="QR" />
    <input id="qrLink" type="text" readonly />
    <button class="copy" id="qrCopy">링크 복사</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const sessionId = params.get('session') || 'default';
const ALL4 = ['ko','en','ja','zh'];
const LABEL = { ko:'한국어', en:'English', ja:'日本語', zh:'中文', es:'Español', fr:'Français', de:'Deutsch', ru:'Русский', vi:'Tiếng Việt', th:'ไทย', id:'Indonesia' };

const $ = (id) => document.getElementById(id);
const feed=$('feed'), empty=$('empty'), partialEl=$('partial'), langSel=$('langSel'), titleEl=$('title');
const cards = new Map(); // id -> {el, line, src, texts, source}
let order = []; // 표시 순서 id 목록
let latestId = null;
let curLang = 'ko';

/* ---- 설정 저장값 ---- */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('kac-theme', t); $('darkToggle').checked = (t==='dark'); }
const FS_BASE = 18; // 100% 기준 px
let fsPct = parseInt(localStorage.getItem('kac-mfs')||'100',10);
if(!(fsPct>=50 && fsPct<=200)) fsPct = 100; // 옛 px 저장값 보정
function applyFs(){ document.documentElement.style.setProperty('--fs', Math.round(FS_BASE*fsPct/100)+'px'); $('fsVal').textContent = fsPct+'%'; localStorage.setItem('kac-mfs', fsPct); }
let showSrc = localStorage.getItem('kac-msrc') === '1';
function applySrc(){ $('srcToggle').checked = showSrc; cards.forEach(c => { c.src.style.display = (showSrc && c.source) ? 'block':'none'; }); }

applyTheme(localStorage.getItem('kac-theme') || 'dark');
applyFs();

/* ---- 언어 select (항상 한·영·일·중) ---- */
async function loadSession(){
  let title = 'KAC Translator';
  try { const s = await fetch('/api/sessions/'+sessionId).then(r=>r.json()); if (s && s.title) title = s.title; } catch {}
  titleEl.textContent = title;
  const saved = localStorage.getItem('kac-mlang-'+sessionId);
  curLang = (saved && ALL4.includes(saved)) ? saved : 'ko';
  langSel.innerHTML='';
  ALL4.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=LABEL[c]||c; langSel.appendChild(o); });
  langSel.value = curLang;
  langSel.onchange = () => { curLang = langSel.value; localStorage.setItem('kac-mlang-'+sessionId, curLang); rerender(); };
}

/* ---- QR ---- */
async function loadQr(){
  try { const d = await fetch('/api/qr?session='+sessionId).then(r=>r.json());
    $('qrImg').src = d.qr; $('qrLink').value = d.url;
  } catch {}
}

// 선택 언어만 표시(다른 언어로 대체하지 않음)
function pick(texts){ return (texts && texts[curLang]) ? texts[curLang] : ''; }
function atBottom(){ return document.body.scrollHeight - window.scrollY - window.innerHeight < 160; }
function scrollDown(){ window.scrollTo(0, document.body.scrollHeight); }

function upsert(item){
  if(empty) empty.style.display='none';
  const stick = atBottom();
  let card = cards.get(item.id);
  if(!card){
    const el=document.createElement('div'); el.className='msg';
    const line=document.createElement('div'); line.className='line'; el.appendChild(line);
    const src=document.createElement('div'); src.className='src'; el.appendChild(src);
    feed.appendChild(el);
    card={el, line, src}; cards.set(item.id, card); order.push(item.id);
    // 최신 강조 이동
    if(latestId && cards.get(latestId)) cards.get(latestId).el.classList.remove('latest');
    el.classList.add('latest'); latestId = item.id;
  }
  card.texts = item.texts || (item.text ? { [curLang]: item.text } : {});
  card.source = item.source || '';
  renderLine(card);
  card.src.textContent = card.source;
  card.src.style.display = (showSrc && card.source) ? 'block' : 'none';
  if(stick) scrollDown();
}
// 선택 언어 번역이 아직 없으면 원문을 흐리게(placeholder)
function renderLine(c){
  const txt = pick(c.texts);
  c.line.textContent = txt || c.source || '';
  c.line.classList.toggle('pending', !txt && !!c.source);
}
function rerender(){ cards.forEach(renderLine); }
function setPartial(text){ const s=atBottom(); partialEl.innerHTML = text ? ('<div class="line">'+text.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))+'</div>') : ''; if(s) scrollDown(); }

/* ---- WS ---- */
let ws;
function connect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/viewer?session=${sessionId}`);
  ws.onclose = () => setTimeout(connect, 1500);
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if(m.type==='snapshot'){ m.items.forEach(it => upsert(it)); }
    else if(m.type==='partial'){ setPartial(m.text); }
    else if(m.type==='sentence'){ setPartial(''); upsert(m); }
  };
}

/* ---- 설정 UI ---- */
function openSheet(){ $('backdrop').classList.add('show'); $('sheet').classList.add('show'); }
function closeSheet(){ $('backdrop').classList.remove('show'); $('sheet').classList.remove('show'); }
$('settingsBtn').onclick = openSheet;
$('backdrop').onclick = closeSheet;
$('fsUp').onclick = (e) => { e.stopPropagation(); fsPct = Math.min(200, fsPct+10); applyFs(); };
$('fsDown').onclick = (e) => { e.stopPropagation(); fsPct = Math.max(50, fsPct-10); applyFs(); };
// QR / 원문 / 다크모드: 행 전체 클릭으로 동작
$('rowQr').onclick = () => { closeSheet(); $('qrModal').classList.add('show'); };
$('rowSrc').onclick = () => { showSrc = !showSrc; $('srcToggle').checked = showSrc; localStorage.setItem('kac-msrc', showSrc?'1':'0'); applySrc(); };
$('rowDark').onclick = () => { applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); };
$('qrClose').onclick = () => $('qrModal').classList.remove('show');
$('qrModal').onclick = (e) => { if(e.target.id==='qrModal') $('qrModal').classList.remove('show'); };
$('qrCopy').onclick = async () => {
  const link = $('qrLink').value;
  try { await navigator.clipboard.writeText(link); } catch { const i=$('qrLink'); i.select(); document.execCommand('copy'); }
  const b=$('qrCopy'); const t=b.textContent; b.textContent='복사됨!'; setTimeout(()=>b.textContent=t, 1200);
};

applySrc();
loadSession();
loadQr();
connect();
</script>
</body>
</html>
