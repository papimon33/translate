<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>KAC 통역 평가 러너</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --card2:#20242d; --line:#2b303b; --tx:#eef1f6; --tx2:#9aa4b2; --pri:#6c8cff; --ok:#2fbf71; --warn:#e0a52e; --err:#e5484d; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--tx); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  .wrap { max-width:720px; margin:0 auto; padding:18px 16px 80px; }
  h1 { font-size:19px; margin:6px 0 2px; }
  .sub { color:var(--tx2); font-size:13px; margin-bottom:18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
  label { display:block; font-size:13px; color:var(--tx2); margin-bottom:6px; }
  select, input[type=text] { width:100%; background:var(--card2); border:1px solid var(--line); color:var(--tx); border-radius:10px; padding:11px 12px; font-size:15px; font-family:inherit; }
  button { font-family:inherit; font-size:15px; font-weight:700; border:none; border-radius:12px; padding:13px 16px; cursor:pointer; }
  .pri { background:var(--pri); color:#fff; }
  .ghost { background:var(--card2); color:var(--tx); border:1px solid var(--line); }
  .row { display:flex; gap:10px; }
  .row > * { flex:1; }
  .muted { color:var(--tx2); font-size:12.5px; }
  .badge { display:inline-block; font-size:12px; font-weight:700; padding:2px 9px; border-radius:999px; }
  .b-easy{ background:rgba(47,191,113,.18); color:#5fd699; } .b-medium{ background:rgba(224,165,46,.18); color:#f0c261; } .b-hard{ background:rgba(229,72,77,.18); color:#f0888b; }
  .dir { font-size:13px; font-weight:700; color:var(--pri); letter-spacing:.02em; }
  .read { font-size:26px; font-weight:800; line-height:1.4; margin:8px 0 4px; word-break:keep-all; }
  .read.ar { direction:rtl; text-align:right; }
  .refs { font-size:14px; color:var(--tx2); line-height:1.7; margin-top:6px; }
  .cap { margin-top:14px; padding-top:14px; border-top:1px dashed var(--line); }
  .caplbl { font-size:12px; color:var(--tx2); margin:8px 0 4px; }
  .partial { min-height:20px; color:var(--tx2); font-size:14px; font-style:italic; }
  .lvl { height:5px; background:var(--card2); border-radius:3px; overflow:hidden; margin-top:6px; }
  .lvl > i { display:block; height:100%; width:0; background:var(--ok); transition:width .08s; }
  .progress { height:6px; background:var(--card2); border-radius:3px; overflow:hidden; margin:12px 0 4px; }
  .progress > i { display:block; height:100%; width:0; background:var(--pri); transition:width .2s; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--tx2); font-weight:600; }
  .pill { font-size:11.5px; padding:1px 7px; border-radius:999px; background:var(--card2); }
  .warn { color:var(--warn); font-size:12.5px; margin-top:6px; }
  .hide { display:none; }
  .foot { position:fixed; left:0; right:0; bottom:0; background:linear-gradient(transparent,var(--bg) 30%); padding:12px 16px; }
  .foot .inner { max-width:720px; margin:0 auto; display:flex; gap:10px; }
  .foot .inner > button { flex:1; }
  a { color:var(--pri); }
  code { background:var(--card2); padding:1px 5px; border-radius:5px; font-size:12.5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>KAC 통역 평가 러너</h1>
  <div class="sub">낭독 → 자동 인식·번역 수집 → 즉시 채점. 관리자 로그인 상태에서 사용하세요.</div>

  <!-- 설정 -->
  <div id="setup" class="card">
    <label>테스트 언어 (외국인 발화 언어)</label>
    <select id="lang">
      <option value="en">영어 (English)</option>
      <option value="zh">중국어 (中文)</option>
      <option value="ja">일본어 (日本語)</option>
      <option value="es">스페인어 (Español)</option>
      <option value="fr">프랑스어 (Français)</option>
      <option value="pt">포르투갈어 (Português)</option>
      <option value="ar">아랍어 (العربية)</option>
    </select>
    <div style="height:12px"></div>
    <label>진행 방식</label>
    <select id="order">
      <option value="pair">시나리오별 (질문→답변) 순</option>
      <option value="q">질문만 (외국어→한국어)</option>
      <option value="a">답변만 (한국어→외국어)</option>
    </select>
    <div style="height:14px"></div>
    <button id="startBtn" class="pri" style="width:100%">마이크 켜고 시작</button>
    <div id="setupMsg" class="muted" style="margin-top:10px"></div>
  </div>

  <!-- 진행 -->
  <div id="run" class="card hide">
    <div style="display:flex; align-items:center; gap:8px;">
      <span id="badge" class="badge b-easy">하</span>
      <span class="muted" id="scid"></span>
      <span style="flex:1"></span>
      <span class="muted" id="count">0 / 0</span>
    </div>
    <div class="progress"><i id="pbar"></i></div>
    <div class="dir" id="dir"></div>
    <div class="read" id="read"></div>
    <div class="refs" id="refs"></div>

    <div class="cap">
      <div class="partial" id="partial">…</div>
      <div class="lvl"><i id="lvl"></i></div>
      <div class="caplbl">인식된 원문 (필요시 수정)</div>
      <input id="capStt" type="text" />
      <div class="caplbl">번역 (필요시 수정)</div>
      <input id="capMt" type="text" />
      <div class="warn hide" id="langWarn"></div>
    </div>
  </div>

  <!-- 완료/채점 -->
  <div id="done" class="card hide">
    <h1 style="font-size:17px; margin-top:0">수집 완료</h1>
    <div class="muted" id="doneMsg"></div>
    <div style="height:12px"></div>
    <div class="row">
      <button class="ghost" id="dlBtn">records.json 내려받기</button>
      <button class="ghost" id="dryBtn">간이 채점 (무료·CER)</button>
      <button class="pri" id="scoreBtn">채점하기 (OpenAI)</button>
    </div>
    <div id="report" style="margin-top:16px"></div>
  </div>
</div>

<div class="foot hide" id="foot"><div class="inner">
  <button class="ghost" id="skipBtn">건너뛰기</button>
  <button class="ghost" id="redoBtn">캡처 지우기</button>
  <button class="pri" id="nextBtn">확정 &amp; 다음 ▶</button>
</div></div>

<script>
const $ = (id) => document.getElementById(id);
const LANG_DISP = { en:'영어', zh:'중국어', ja:'일본어', es:'스페인어', fr:'프랑스어', pt:'포르투갈어', ar:'아랍어', ko:'한국어' };
const DIFF_KO = { easy:'하', medium:'중', hard:'상' };
let dataset=null, L='en', queue=[], idx=0, records=[];
let ws=null, actx=null, proc=null, stream=null, keepAlive=null;
let lastSentence=null;  // 가장 최근 완결 문장(캡처 후보)

/* ---- 오디오 유틸(mobile.html 과 동일) ---- */
function f32to16(f32){ const b=new ArrayBuffer(f32.length*2), v=new DataView(b); for(let i=0;i<f32.length;i++){ let s=Math.max(-1,Math.min(1,f32[i])); s=s<0?s*0x8000:s*0x7fff; v.setInt16(i*2,s,true);} return b; }
function ds24(f32,rate){ if(rate===24000) return f32; const r=rate/24000, n=Math.round(f32.length/r), o=new Float32Array(n); for(let i=0;i<n;i++){ const idx=i*r, i0=Math.floor(idx), i1=Math.min(i0+1,f32.length-1); o[i]=f32[i0]*(1-(idx-i0))+f32[i1]*(idx-i0);} return o; }

async function loadDataset(){
  const r = await fetch('/api/eval/dataset');
  if(r.status===401||r.status===403){ $('setupMsg').innerHTML='관리자 로그인이 필요합니다. <a href="/">앱에서 로그인</a> 후 이 페이지를 새로고침하세요.'; return false; }
  if(!r.ok){ $('setupMsg').textContent='정답셋을 불러오지 못했습니다. ('+r.status+')'; return false; }
  dataset = await r.json();
  $('setupMsg').textContent = dataset.scenarios.length + '개 시나리오 로드됨.';
  return true;
}

function buildQueue(){
  const order = $('order').value;
  queue = [];
  for(const s of dataset.scenarios){
    const q = { scId:s.id, diff:s.difficulty, direction:'q', read:s.question.src[L], readLang:L,
                refs:[['영어',s.question.src.en],['한국어',s.question.ko_ref]] };
    const a = { scId:s.id, diff:s.difficulty, direction:'a', read:s.answer.ko_src, readLang:'ko',
                refs:[['영어',s.answer.ref.en],[LANG_DISP[L], s.answer.ref[L]]] };
    if(order==='q') queue.push(q);
    else if(order==='a') queue.push(a);
    else { queue.push(q); queue.push(a); }
  }
}

/* ---- WS + 마이크 ---- */
async function startCapture(){
  const proto = location.protocol==='https:'?'wss':'ws';
  const sid = 'eval-'+Math.random().toString(36).slice(2,9);
  const qs = `session=${sid}&pipeline=soniox&sxMode=two&sxA=ko&sxB=${encodeURIComponent(L)}&tts=0`;
  ws = new WebSocket(`${proto}://${location.host}/ws/host?${qs}`);
  ws.binaryType='arraybuffer';
  ws.onmessage = (e)=>{ try { onMsg(JSON.parse(e.data)); } catch {} };
  ws.onclose = ()=>{ if(keepAlive) clearInterval(keepAlive); };
  await new Promise((res,rej)=>{ ws.onopen=res; ws.onerror=()=>rej(new Error('ws')); setTimeout(()=>rej(new Error('timeout')),6000); });
  // 유휴 종료(60s) 방지 — 낭독 간격이 길어도 세션 유지
  keepAlive = setInterval(()=>{ try { if(ws.readyState===1) ws.send(JSON.stringify({type:'activity'})); } catch {} }, 20000);

  stream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true } });
  actx = new (window.AudioContext||window.webkitAudioContext)();
  const rate = actx.sampleRate;
  const node = actx.createMediaStreamSource(stream);
  proc = actx.createScriptProcessor(4096,1,1);
  node.connect(proc); const g=actx.createGain(); g.gain.value=0; proc.connect(g); g.connect(actx.destination);
  proc.onaudioprocess = (e)=>{
    if(!ws || ws.readyState!==1) return;
    const input = e.inputBuffer.getChannelData(0);
    // 레벨 미터
    let peak=0; for(let i=0;i<input.length;i+=64){ const v=Math.abs(input[i]); if(v>peak) peak=v; }
    $('lvl').style.width = Math.min(100, peak*180) + '%';
    if(ws.bufferedAmount > 131072) return;
    ws.send(f32to16(ds24(input, rate)));
  };
}

function onMsg(m){
  if(m.type==='partial'){ $('partial').textContent = m.text || '…'; return; }
  if(m.type==='sentence'){
    const empty = !m.source && (!m.texts || !Object.values(m.texts).some(Boolean));
    if(empty) return; // 삭제(고스트) 신호 무시
    lastSentence = m;
    reflectCapture();
  }
}

// 현재 프롬프트 방향에 맞춰 캡처 후보를 입력칸에 반영
function reflectCapture(){
  if(!lastSentence) return;
  const p = queue[idx]; if(!p) return;
  const texts = lastSentence.texts||{};
  let stt = lastSentence.source||'';
  let mt = p.direction==='q' ? (texts.ko||'') : (texts[L]||'');
  $('capStt').value = stt;
  $('capMt').value = mt;
  $('partial').textContent = '';
  // 언어 감지 경고: 질문은 L, 답변은 ko 로 인식돼야 정상
  const expect = p.direction==='q' ? L : 'ko';
  const w = $('langWarn');
  if(lastSentence.lang && lastSentence.lang!==expect){ w.textContent='⚠ 감지 언어('+(LANG_DISP[lastSentence.lang]||lastSentence.lang)+')가 예상과 다릅니다 — 다시 읽어 주세요.'; w.classList.remove('hide'); }
  else w.classList.add('hide');
}

function showPrompt(){
  const p = queue[idx];
  $('badge').className='badge b-'+p.diff; $('badge').textContent=DIFF_KO[p.diff];
  $('scid').textContent = p.scId;
  $('count').textContent = (idx+1)+' / '+queue.length;
  $('pbar').style.width = (idx/queue.length*100)+'%';
  $('dir').textContent = p.direction==='q' ? ('질문 — '+LANG_DISP[L]+'로 읽어 주세요 (외국인)') : '답변 — 한국어로 읽어 주세요 (안내원)';
  const rd = $('read'); rd.textContent = p.read; rd.className = 'read'+(p.readLang==='ar'?' ar':'');
  $('refs').innerHTML = p.refs.filter(r=>r[1]).map(r=>`<div><b style="color:#7d8695">${r[0]}</b> ${r[1]}</div>`).join('');
  $('capStt').value=''; $('capMt').value=''; $('partial').textContent='…'; $('langWarn').classList.add('hide');
  lastSentence=null;
}

function commitCurrent(skip){
  const p = queue[idx];
  if(!skip){
    const stt=$('capStt').value.trim(), mt=$('capMt').value.trim();
    if(stt||mt) records.push({ scenario_id:p.scId, direction:p.direction, lang:L, stt, mt });
  }
  idx++;
  if(idx>=queue.length){ finish(); return; }
  showPrompt();
}

function finish(){
  try { if(proc) proc.onaudioprocess=null; } catch {}
  try { if(stream) stream.getTracks().forEach(t=>t.stop()); } catch {}
  try { if(actx) actx.close(); } catch {}
  try { if(ws) ws.send(JSON.stringify({type:'stop'})); ws.close(); } catch {}
  if(keepAlive) clearInterval(keepAlive);
  $('run').classList.add('hide'); $('foot').classList.add('hide');
  $('done').classList.remove('hide');
  $('doneMsg').textContent = records.length+'건 수집됨 (언어: '+LANG_DISP[L]+').';
}

/* ---- 채점 리포트 ---- */
async function runScore(dry){
  $('report').innerHTML = '<div class="muted">채점 중…'+(dry?'':' (OpenAI 호출)')+'</div>';
  try {
    const r = await fetch('/api/eval/score', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ records, dry }) });
    const d = await r.json();
    if(!r.ok){ $('report').innerHTML = '<div class="warn">채점 실패: '+(d.error||r.status)+'</div>'; return; }
    renderReport(d);
  } catch(e){ $('report').innerHTML = '<div class="warn">채점 실패: '+e.message+'</div>'; }
}
function pct(x){ return x==null?'-':Math.round(x*100)+'%'; }
function f2(x){ return x==null?'-':x.toFixed(2); }
function f3(x){ return x==null?'-':x.toFixed(3); }
function renderReport(d){
  const R=d.report, dir={q:'질문(외국어→한)',a:'답변(한→외국어)'};
  let h = `<div class="muted">records ${R.total} · valid ${R.valid} · ${d.dry?'DRY(CER만)':'judge '+d.model}</div>`;
  const tbl = (title, rows, nameMap) => {
    h += `<div style="margin-top:12px; font-weight:700; font-size:13px">${title}</div>`;
    h += '<table><tr><th>구분</th><th>n</th><th>CER</th><th>적합성</th><th>STT정상</th><th>번역정상</th></tr>';
    for(const x of rows) h += `<tr><td>${(nameMap&&nameMap[x.key])||x.key}</td><td>${x.n}</td><td>${f3(x.cer)}</td><td>${f2(x.adq)}</td><td>${pct(x.sttOk)}</td><td>${pct(x.mtOk)}</td></tr>`;
    h += '</table>';
  };
  tbl('방향별', R.byDirection, dir);
  tbl('언어별', R.byLang, LANG_DISP);
  if(!d.dry){
    h += `<div style="margin-top:12px; font-weight:700; font-size:13px">오류 귀속</div><div class="muted">`;
    h += Object.entries(R.faults).map(([k,v])=>`<span class="pill">${k}=${v}</span>`).join(' ');
    h += ` <br><span style="font-size:11.5px">mt=번역탓 · stt=인식탓 · stt_recovered=인식오류를 번역이 복원</span></div>`;
    if(R.tags.length){ h += `<div style="margin-top:12px; font-weight:700; font-size:13px">번역 오류 유형</div><div class="muted">`+R.tags.map(([k,v])=>`<span class="pill">${k}=${v}</span>`).join(' ')+`</div>`; }
    if(R.trapAdq.length){ h += `<div style="margin-top:12px; font-weight:700; font-size:13px">함정유형별 적합성(낮을수록 취약)</div><div class="muted">`+R.trapAdq.map(t=>`<span class="pill">${t.trap} ${f2(t.adq)}</span>`).join(' ')+`</div>`; }
    if(R.worst&&R.worst.length){
      h += `<div style="margin-top:12px; font-weight:700; font-size:13px">최악 사례</div>`;
      for(const s of R.worst){ h += `<div style="margin:8px 0; padding:8px 10px; background:var(--card2); border-radius:8px; font-size:12.5px">
        <div><b>[${s.lang}/${s.direction}] ${s.scenario_id}</b> · CER ${f2(s.cer)} · 적합성 ${s.judge?.adequacy??'-'} · ${s.fault}${s.judge?.error_tags?.length?' · '+s.judge.error_tags.join(','):''}</div>
        <div class="muted">STT: ${s.stt}</div><div class="muted">MT: ${s.mt}</div>
        ${s.judge?.note?'<div class="muted">심사: '+s.judge.note+'</div>':''}</div>`; }
    }
  }
  $('report').innerHTML = h;
}

/* ---- 이벤트 ---- */
$('startBtn').onclick = async ()=>{
  L = $('lang').value;
  if(!dataset){ $('setupMsg').textContent='정답셋 로딩 중…'; if(!await loadDataset()) return; }
  buildQueue();
  $('startBtn').disabled=true; $('setupMsg').textContent='마이크 권한 요청 중…';
  try { await startCapture(); }
  catch(e){ $('startBtn').disabled=false; $('setupMsg').textContent='시작 실패: 마이크 권한/https 확인 ('+e.message+')'; return; }
  idx=0; records=[];
  $('setup').classList.add('hide'); $('run').classList.remove('hide'); $('foot').classList.remove('hide');
  showPrompt();
};
$('nextBtn').onclick = ()=>commitCurrent(false);
$('skipBtn').onclick = ()=>commitCurrent(true);
$('redoBtn').onclick = ()=>{ $('capStt').value=''; $('capMt').value=''; lastSentence=null; $('partial').textContent='…'; $('langWarn').classList.add('hide'); };
$('dlBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify({ records }, null, 2)], {type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='records-'+L+'.json'; a.click(); URL.revokeObjectURL(a.href);
};
$('dryBtn').onclick = ()=>runScore(true);
$('scoreBtn').onclick = ()=>runScore(false);

loadDataset();
</script>
</body>
</html>
